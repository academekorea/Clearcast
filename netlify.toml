[build]
  publish = "."
  command = "npm install"

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"
  included_files = ["netlify/functions/lib/**"]

[[redirects]]
  from = "/show/*"
  to = "/"
  status = 200

[[redirects]]
  from = "/account"
  to = "/account.html"
  status = 200

[[redirects]]
  from = "/analysis/*"
  to = "/analysis.html"
  status = 200

[[redirects]]
  from = "/library"
  to = "/library.html"
  status = 200

[[redirects]]
  from = "/auth/spotify/callback"
  to = "/.netlify/functions/auth-spotify-callback"
  status = 200

[[redirects]]
  from = "/auth/youtube/callback"
  to = "/.netlify/functions/auth-youtube-callback"
  status = 200

[[redirects]]
  from = "/api/connect-youtube"
  to = "/.netlify/functions/connect-youtube"
  status = 200

[[redirects]]
  from = "/api/notifications"
  to = "/.netlify/functions/notifications"
  status = 200

[[redirects]]
  from = "/api/pre-analyze"
  to = "/.netlify/functions/pre-analyze"
  status = 200

[[redirects]]
  from = "/api/check-pilot-expiry"
  to = "/.netlify/functions/check-pilot-expiry"
  status = 200

[[redirects]]
  from = "/api/push-subscribe"
  to = "/.netlify/functions/push-subscribe"
  status = 200
