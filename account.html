<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Account — Podlens</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="icon" type="image/x-icon" href="/favicon.ico">
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
<link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
<meta name="description" content="Manage your Podlens profile, settings, and billing.">
<meta property="og:title" content="Account — Podlens">
<meta property="og:image" content="https://podlens.app/og-image.png">
<meta name="theme-color" content="#0f2027">
<link rel="canonical" href="https://podlens.app/account">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#FAF9F6;--bg2:#FFFFFF;--bg3:#F0EFE9;--bg4:#E5E4DE;
  --text:#1a1a1a;--text2:#555;--text3:#999;
  --navy:#0f2027;--left:#E24B4A;--right:#378ADD;
  --border:rgba(0,0,0,0.1);--border2:rgba(0,0,0,0.15);
  --ff:'Inter',-apple-system,sans-serif;--ffs:'Playfair Display',Georgia,serif;--r:4px;
  --accent:#6366F1;
}
@media(prefers-color-scheme:dark){:root:not([data-theme="light"]){
  --bg:#0D0D0D;--bg2:#161616;--bg3:#1F1F1F;--bg4:#2A2A2A;
  --text:#FAF9F6;--text2:#888;--text3:#555;
  --border:rgba(255,255,255,0.08);--border2:rgba(255,255,255,0.14);
}}
[data-theme="dark"]{--bg:#0D0D0D;--bg2:#161616;--bg3:#1F1F1F;--bg4:#2A2A2A;--text:#FAF9F6;--text2:#888;--text3:#555;--border:rgba(255,255,255,0.08);--border2:rgba(255,255,255,0.14)}
[data-theme="light"]{--bg:#FAF9F6;--bg2:#FFFFFF;--bg3:#F0EFE9;--text:#1a1a1a;--text2:#555;--text3:#999;--border:rgba(0,0,0,0.1);--border2:rgba(0,0,0,0.15)}
html{scroll-behavior:smooth}
body{font-family:var(--ff);background:var(--bg);color:var(--text);min-height:100vh;-webkit-font-smoothing:antialiased;font-size:16px;line-height:1.6}
a{color:var(--navy)}
[data-theme="dark"] a{color:inherit}

/* ── NAV ── */
nav{display:flex;align-items:center;justify-content:space-between;padding:0 24px;height:60px;border-bottom:1px solid var(--border);background:var(--bg);position:sticky;top:0;z-index:100}
.nav-logo{display:flex;align-items:center;gap:8px;text-decoration:none;color:var(--navy);font-family:var(--ffs);font-weight:700;font-size:1rem;letter-spacing:.08em}
[data-theme="dark"] .nav-logo{color:var(--text)}
.nav-logo img{border-radius:4px}
.nav-r{display:flex;align-items:center;gap:8px}
.nl{padding:6px 12px;font-size:13px;color:var(--text2);border-radius:var(--r);text-decoration:none;font-family:var(--ff)}
.nl:hover{background:var(--bg3);color:var(--text)}
.mode-toggle{background:none;border:none;font-size:20px;cursor:pointer;padding:4px 8px;border-radius:8px;line-height:1}

/* ── LAYOUT ── */
.account-wrap{max-width:760px;margin:0 auto;padding:40px 24px 80px}
@media(max-width:600px){.account-wrap{padding:24px 16px 60px}}

/* ── TABS ── */
.tabs{display:flex;gap:2px;border-bottom:1px solid var(--border);margin-bottom:32px;overflow-x:auto}
.tab{padding:10px 18px;font-size:13px;font-weight:500;color:var(--text2);cursor:pointer;border:none;background:none;font-family:var(--ff);border-bottom:2px solid transparent;margin-bottom:-1px;white-space:nowrap;transition:color .15s,border-color .15s}
.tab:hover{color:var(--text)}
.tab.active{color:var(--navy);border-bottom-color:var(--navy);font-weight:600}
[data-theme="dark"] .tab.active{color:var(--text)}
[data-theme="dark"] .tab.active{border-bottom-color:var(--text)}

/* ── SECTIONS ── */
.section{background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:24px;margin-bottom:16px}
.section-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.09em;color:var(--text3);margin-bottom:20px}
.section-heading{font-family:var(--ffs);font-size:20px;font-weight:700;margin-bottom:4px}
.section-sub{font-size:13px;color:var(--text2);margin-bottom:20px}

/* ── FORM ── */
.field{margin-bottom:20px}
.field label{display:block;font-size:13px;font-weight:500;color:var(--text2);margin-bottom:6px}
.field input,.field textarea{width:100%;padding:10px 12px;font-size:14px;font-family:var(--ff);border:1px solid var(--border2);border-radius:var(--r);background:var(--bg);color:var(--text);outline:none;transition:border-color .15s}
.field input:focus,.field textarea:focus{border-color:var(--navy)}
.field textarea{resize:vertical;min-height:80px}
.field .char-count{font-size:11px;color:var(--text3);text-align:right;margin-top:4px}
.field .badge-verified{font-size:11px;color:#059669;background:#ECFDF5;border:1px solid #A7F3D0;padding:2px 8px;border-radius:12px;margin-left:8px;vertical-align:middle}
.field-readonly{padding:10px 12px;font-size:14px;background:var(--bg3);border:1px solid var(--border);border-radius:var(--r);color:var(--text2)}

/* ── AVATAR ── */
.avatar-row{display:flex;align-items:center;gap:20px;margin-bottom:24px}
.avatar-circle{width:72px;height:72px;border-radius:50%;background:var(--navy);color:#fff;display:flex;align-items:center;justify-content:center;font-size:26px;font-weight:700;font-family:var(--ffs);overflow:hidden;flex-shrink:0;cursor:pointer;position:relative;border:3px solid var(--border2)}
.avatar-circle img{width:100%;height:100%;object-fit:cover}
.avatar-circle:hover::after{content:'Change';position:absolute;inset:0;background:rgba(0,0,0,.45);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;color:#fff;border-radius:50%}
.avatar-file{display:none}
.avatar-meta{font-size:12px;color:var(--text3);line-height:1.5}

/* ── BUTTONS ── */
.btn-primary{padding:10px 22px;background:var(--navy);color:#fff;border:none;border-radius:var(--r);cursor:pointer;font-size:13px;font-weight:600;font-family:var(--ff);transition:opacity .15s;display:inline-flex;align-items:center;gap:8px}
.btn-primary:hover{opacity:.85}
.btn-primary:disabled{opacity:.5;cursor:not-allowed}
.btn-ghost{padding:10px 18px;background:transparent;color:var(--text2);border:1px solid var(--border2);border-radius:var(--r);cursor:pointer;font-size:13px;font-family:var(--ff);transition:all .1s;text-decoration:none;display:inline-block}
.btn-ghost:hover{border-color:var(--text);color:var(--text)}
.btn-danger{padding:10px 18px;background:transparent;color:var(--left);border:1px solid var(--left);border-radius:var(--r);cursor:pointer;font-size:13px;font-family:var(--ff);transition:all .15s}
.btn-danger:hover{background:var(--left);color:#fff}
.btn-row{display:flex;gap:8px;flex-wrap:wrap;margin-top:8px}

/* ── TOGGLES ── */
.toggle-row{display:flex;align-items:center;justify-content:space-between;padding:14px 0;border-bottom:1px solid var(--border)}
.toggle-row:last-child{border-bottom:none}
.toggle-label{font-size:14px;font-weight:500}
.toggle-sub{font-size:12px;color:var(--text3);margin-top:2px}
.bt-switch{position:relative;display:inline-block;width:42px;height:24px;flex-shrink:0}
.bt-switch input{opacity:0;width:0;height:0}
.bt-track{position:absolute;cursor:pointer;inset:0;background:var(--border2);border-radius:12px;transition:background .2s}
.bt-track::before{content:'';position:absolute;height:18px;width:18px;left:3px;bottom:3px;background:#fff;border-radius:50%;transition:transform .2s}
.bt-switch input:checked+.bt-track{background:var(--navy)}
.bt-switch input:checked+.bt-track::before{transform:translateX(18px)}

/* ── BILLING TIER CARDS ── */
.tier-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-top:4px}
@media(max-width:720px){.tier-grid{grid-template-columns:1fr 1fr}}
@media(max-width:480px){.tier-grid{grid-template-columns:1fr}}
.tier-card{border:1px solid var(--border);border-radius:8px;padding:16px;position:relative}
.tier-card.current{border-color:var(--navy);border-width:2px}
.tc-badge{position:absolute;top:-10px;left:50%;transform:translateX(-50%);font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;padding:2px 10px;background:var(--navy);color:#fff;border-radius:var(--r);white-space:nowrap}
.tc-name{font-family:var(--ffs);font-size:15px;font-weight:700;margin-bottom:4px}
.tc-price{font-size:22px;font-weight:700;font-family:var(--ffs);line-height:1}
.tc-period{font-size:11px;color:var(--text3);margin-bottom:12px}
.tc-cta{display:block;width:100%;padding:9px;text-align:center;font-size:12px;font-weight:600;border:1.5px solid var(--navy);color:var(--navy);border-radius:var(--r);cursor:pointer;background:transparent;font-family:var(--ff);transition:all .15s;text-decoration:none;margin-top:auto}
.tc-cta:hover,.tier-card.current .tc-cta{background:var(--navy);color:#fff}
.tc-cta.current-badge{background:transparent;color:var(--text3);border-color:var(--border);cursor:default}
.tc-cta.current-badge:hover{background:transparent;color:var(--text3)}
.tc-cta.downgrade{border-color:var(--border2);color:var(--text2)}
.tc-cta.downgrade:hover{border-color:var(--text);color:var(--text);background:transparent}
.plan-hero{display:flex;align-items:center;gap:16px;margin-bottom:24px;padding:20px;background:var(--bg3);border-radius:8px}
.plan-hero-badge{padding:4px 14px;border-radius:var(--r);font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;flex-shrink:0}
.plan-hero-name{font-family:var(--ffs);font-size:22px;font-weight:700}
.plan-hero-meta{font-size:13px;color:var(--text2);margin-top:2px}

/* ── INFO ROWS ── */
.info-row{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid var(--border);font-size:13px}
.info-row:last-child{border-bottom:none}
.info-label{color:var(--text2)}
.info-val{font-weight:500}

/* ── DANGER ZONE ── */
.danger-zone{border:1px solid rgba(226,75,74,.3);border-radius:8px;padding:20px;margin-top:24px}
.danger-title{font-size:14px;font-weight:600;color:var(--left);margin-bottom:6px}
.danger-sub{font-size:12px;color:var(--text2);margin-bottom:14px}

/* ── SPINNER ── */
.spin{width:18px;height:18px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;display:inline-block}
.spin.dark{border:2px solid var(--border2);border-top-color:var(--text)}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── TOAST ── */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--navy);color:#fff;padding:12px 20px;border-radius:8px;font-size:13px;font-weight:500;z-index:9999;transition:transform .3s ease;white-space:nowrap}
.toast.on{transform:translateX(-50%) translateY(0)}
.toast.error{background:var(--left)}

/* ── SMART QUEUE SHOWS ── */
.sq-show-row{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid var(--border)}
.sq-show-row:last-child{border-bottom:none}
.sq-show-art{width:40px;height:40px;border-radius:4px;object-fit:cover;flex-shrink:0;background:var(--bg3)}
.sq-show-name{font-size:13px;font-weight:500;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

/* ── MODAL ── */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:500;display:flex;align-items:center;justify-content:center;padding:16px}
.modal-overlay.hidden{display:none}
.modal-box{background:var(--bg2);border-radius:12px;padding:28px;max-width:440px;width:100%}
.modal-title{font-family:var(--ffs);font-size:20px;font-weight:700;margin-bottom:8px}
.modal-body{font-size:14px;color:var(--text2);margin-bottom:20px;line-height:1.6}
.modal-actions{display:flex;gap:10px;justify-content:flex-end}

/* ── SETTINGS hidden tab ── */
.tab-pane{display:none}
.tab-pane.active{display:block}

footer{border-top:1px solid var(--border);padding:32px 24px;background:var(--bg);font-size:12px;color:var(--text3);text-align:center;margin-top:40px}
</style>
<script>(function(){var s=localStorage.getItem('podlens-mode')||localStorage.getItem('pl-theme');if(s==='light'){document.documentElement.setAttribute('data-theme','light');document.documentElement.classList.add('light-mode');}else if(s==='dark'){document.documentElement.setAttribute('data-theme','dark');}})()
function toggleMode(){var isNowLight=document.body.classList.toggle('light-mode');document.documentElement.setAttribute('data-theme',isNowLight?'light':'dark');localStorage.setItem('podlens-mode',isNowLight?'light':'dark');localStorage.setItem('pl-theme',isNowLight?'light':'dark');}
</script>
</head>
<body>

<nav>
  <a href="/" class="nav-logo">
    <img src="/favicon-32x32.png" alt="Podlens" width="28" height="28">
    <span><span style="font-weight:400">POD</span>LENS</span>
  </a>
  <div class="nav-links" id="nav-links"></div>
</nav>
<script src="/js/utils.js" defer></script>
    <script src="/nav.js" defer></script>

<div class="account-wrap">
  <div id="account-root">
    <div style="padding:60px 0;text-align:center;color:var(--text3)">
      <div class="spin dark" style="margin:0 auto 12px"></div>
      Loading&hellip;
    </div>
  </div>
</div>

<!-- Delete account confirmation modal -->
<div class="modal-overlay hidden" id="delete-modal">
  <div class="modal-box">
    <div class="modal-title">Delete your account?</div>
    <div class="modal-body">
      Your account will be queued for deletion. You have <strong>7 days</strong> to log back in and cancel. After that, your data is permanently removed and cannot be recovered.
    </div>
    <div class="modal-actions">
      <button class="btn-ghost" onclick="closeDeleteModal()">Cancel</button>
      <button class="btn-danger" id="confirm-delete-btn" onclick="confirmDelete()">Delete my account</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<footer>&copy; 2026 Podlens &nbsp;&middot;&nbsp; <a href="mailto:hello@podlens.app" style="color:inherit">hello@podlens.app</a></footer>

<script>
// ── UTILITIES ────────────────────────────────────────────────────────────────

function plUser() {
  try { return JSON.parse(localStorage.getItem('pl-user') || 'null'); } catch { return null; }
}
function setPlUser(obj) {
  if (obj) localStorage.setItem('pl-user', JSON.stringify(obj));
  else localStorage.removeItem('pl-user');
}

var SUPER_ADMIN_EMAIL = 'academekorea@gmail.com';
function isSuperAdmin(u) {
  return u && (u.email === SUPER_ADMIN_EMAIL || u.isSuperAdmin);
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

var _toastTimer;
function showToast(msg, isError) {
  var el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'toast' + (isError ? ' error' : '') + ' on';
  clearTimeout(_toastTimer);
  _toastTimer = setTimeout(function(){ el.classList.remove('on'); }, 3000);
}

function getInitials(name) {
  return (name || 'U').trim().split(' ').map(function(w){ return w[0] || ''; }).slice(0,2).join('').toUpperCase();
}
function getAvatarColor(name) {
  var cols = ['#6366F1','#8B5CF6','#EC4899','#EF4444','#F59E0B','#10B981','#3B82F6','#06B6D4'];
  return cols[((name || 'U').charCodeAt(0) || 0) % cols.length];
}

function formatDate(iso) {
  if (!iso) return '—';
  try { return new Date(iso).toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' }); }
  catch { return iso; }
}

// ── TABS ─────────────────────────────────────────────────────────────────────

var TABS = ['profile', 'settings', 'billing'];

function currentTab() {
  var p = new URLSearchParams(window.location.search);
  var t = p.get('tab') || 'profile';
  return TABS.includes(t) ? t : 'profile';
}

function switchTab(tab) {
  var url = new URL(window.location.href);
  url.searchParams.set('tab', tab);
  history.pushState({}, '', url.toString());
  renderActiveTab(tab);
}

function renderActiveTab(tab) {
  // Update tab buttons
  document.querySelectorAll('.tab').forEach(function(btn) {
    btn.classList.toggle('active', btn.dataset.tab === tab);
  });
  // Show/hide panes
  document.querySelectorAll('.tab-pane').forEach(function(pane) {
    pane.classList.toggle('active', pane.id === 'pane-' + tab);
  });
}

// ── BILLING DATA ─────────────────────────────────────────────────────────────

var TIERS = [
  { key: 'free',     name: 'Listener',     price: 'Free',    period: 'forever' },
  { key: 'creator',  name: 'Starter Lens', price: '$4.69',   period: '/mo founding' },
  { key: 'operator', name: 'Pro Lens',     price: '$12.73',  period: '/mo founding' },
  { key: 'studio',   name: 'Operator Lens',price: '$32.83',  period: '/mo founding' },
];

var PLAN_BADGES = {
  free: 'background:#F3F4F6;color:#374151;border:1px solid #E5E7EB',
  trial: 'background:#EDE9FE;color:#6D28D9;border:1px solid #C4B5FD',
  creator: 'background:#DBEAFE;color:#1D4ED8;border:1px solid #BFDBFE',
  operator: 'background:#0f2027;color:#fff;border:1px solid #0f2027',
  studio: 'background:#1a1a1a;color:#D97706;border:1px solid #1a1a1a',
};

var PODLENS_PRICES = {
  creator_monthly: '', creator_annual: '',
  operator_monthly: '', operator_annual: '',
  studio_monthly: '', studio_annual: '',
};

// Load price IDs from server (same as index.html)
(function loadAccountPrices() {
  fetch('/api/public-config')
    .then(function(r){ return r.json(); })
    .then(function(cfg){
      if (cfg && cfg.prices) {
        Object.keys(cfg.prices).forEach(function(k){
          if (cfg.prices[k]) PODLENS_PRICES[k] = cfg.prices[k];
        });
      }
    }).catch(function(){});
})();

// ── PROFILE TAB ──────────────────────────────────────────────────────────────

function renderProfileTab(u, profile) {
  var name = profile && profile.name !== undefined ? profile.name : (u.name || '');
  var bio  = (profile && profile.bio) || '';
  var avatarUrl = u.avatar_custom_url || u.avatar_url || '';
  var displayName = name || u.email || 'User';
  var avatarInner = avatarUrl
    ? '<img src="' + escHtml(avatarUrl) + '" alt="' + escHtml(displayName) + '" style="width:100%;height:100%;object-fit:cover" onerror="this.parentElement.innerHTML=\'' + getInitials(displayName) + '\'">'
    : getInitials(displayName);

  var pane = document.getElementById('pane-profile');
  pane.innerHTML = '<div class="section">'
    + '<div class="section-title">Profile</div>'
    + '<div class="avatar-row">'
    + '<div class="avatar-circle" id="avatar-circle" style="background:' + getAvatarColor(displayName) + '" onclick="document.getElementById(\'avatar-file\').click()">'
    + avatarInner
    + '</div>'
    + '<input type="file" id="avatar-file" class="avatar-file" accept="image/*" onchange="handleAvatarUpload(this)">'
    + '<div class="avatar-meta">Click to upload a new photo<br>JPG, PNG or GIF · Max 2 MB</div>'
    + '</div>'
    + '<div class="field"><label for="field-name">Display name</label>'
    + '<input type="text" id="field-name" placeholder="Your name" maxlength="100" value="' + escHtml(name) + '"></div>'
    + '<div class="field"><label for="field-bio">Bio <span style="font-weight:400;color:var(--text3)">(optional)</span></label>'
    + '<textarea id="field-bio" placeholder="A short description about yourself" maxlength="160" oninput="updateCharCount(this, 160)">' + escHtml(bio) + '</textarea>'
    + '<div class="char-count" id="bio-count">' + bio.length + '/160</div></div>'
    + '<div class="field"><label>Email <span class="badge-verified">✓ verified</span></label>'
    + '<div class="field-readonly">' + escHtml(u.email || '') + '</div></div>'
    + '<div class="btn-row">'
    + '<button class="btn-primary" id="save-profile-btn" onclick="saveProfile()">Save changes</button>'
    + '</div>'
    + '</div>'
    + '<div class="danger-zone">'
    + '<div class="danger-title">Danger zone</div>'
    + '<div class="danger-sub">Deleting your account gives you a 7-day recovery window. After that, all data is permanently removed.</div>'
    + '<button class="btn-danger" onclick="openDeleteModal()">Delete account</button>'
    + '</div>';
}

function updateCharCount(el, max) {
  var count = document.getElementById('bio-count');
  if (count) count.textContent = el.value.length + '/' + max;
}

async function saveProfile() {
  var u = plUser();
  if (!u) return;
  var btn = document.getElementById('save-profile-btn');
  btn.disabled = true;
  btn.innerHTML = '<span class="spin"></span> Saving…';
  var name = (document.getElementById('field-name') || {}).value || '';
  var bio  = (document.getElementById('field-bio')  || {}).value || '';
  try {
    var res = await fetch('/api/update-profile', {
      method: 'PATCH',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ userId: u.id, name: name.trim(), bio: bio.trim() }),
    });
    var data = await res.json();
    if (!res.ok || data.error) throw new Error(data.error || 'Save failed');
    // Update local cache
    u.name = name.trim();
    setPlUser(u);
    showToast('Profile saved');
  } catch(e) {
    showToast(e.message || 'Save failed', true);
  } finally {
    btn.disabled = false;
    btn.textContent = 'Save changes';
  }
}

function handleAvatarUpload(input) {
  var file = input.files[0];
  if (!file) return;
  if (file.size > 2 * 1024 * 1024) { showToast('Image must be under 2 MB', true); return; }
  var reader = new FileReader();
  reader.onload = function(e) {
    var circle = document.getElementById('avatar-circle');
    if (circle) circle.innerHTML = '<img src="' + e.target.result + '" style="width:100%;height:100%;object-fit:cover">';
    // TODO: POST to /api/avatar/:userId when CDN upload is configured
    showToast('Avatar preview updated — full upload coming soon');
  };
  reader.readAsDataURL(file);
}

// ── SETTINGS TAB ─────────────────────────────────────────────────────────────

async function renderSettingsTab(u, plan) {
  var pane = document.getElementById('pane-settings');
  pane.innerHTML = '<div class="section"><div class="section-title">Notifications</div><div id="notif-toggles"><div class="spin dark" style="margin:8px auto"></div></div></div>'
    + (canAccessSettings(plan, 'smartQueue') ? '<div class="section"><div class="section-title">Smart Queue <span style="font-size:10px;background:var(--navy);color:#fff;padding:2px 6px;border-radius:3px;vertical-align:middle;margin-left:4px">' + (plan === 'creator' ? 'Creator' : 'Operator') + '+</span></div><div id="sq-toggles"><div class="spin dark" style="margin:8px auto"></div></div></div>' : '')
    + (canAccessSettings(plan, 'analysis') ? '<div class="section"><div class="section-title">Analysis Preferences</div><div id="analysis-toggles"><div class="spin dark" style="margin:8px auto"></div></div></div>' : '')
    + '<div class="btn-row" style="margin-top:8px"><button class="btn-primary" id="save-settings-btn" onclick="saveSettings()">Save settings</button></div>';

  // Load settings from API
  try {
    var res = await fetch('/api/get-settings?userId=' + encodeURIComponent(u.id));
    var settings = await res.json();
    renderNotifToggles(settings);
    if (canAccessSettings(plan, 'smartQueue')) renderSmartQueueToggles(u, plan, settings);
    if (canAccessSettings(plan, 'analysis')) renderAnalysisToggles(plan, settings);
  } catch {
    showToast('Could not load settings', true);
  }
}

function canAccessSettings(plan, feature) {
  if (feature === 'smartQueue') return ['creator','operator','studio','trial'].includes(plan);
  if (feature === 'analysis') return ['creator','operator','studio','trial'].includes(plan);
  return true;
}

function renderNotifToggles(s) {
  var el = document.getElementById('notif-toggles');
  if (!el) return;
  el.innerHTML = toggle('digestEmail', 'Weekly digest email', 'A weekly summary of your listening + bias fingerprint', s.digestEmail)
    + toggle('episodeAlerts', 'New episode alerts', 'Get notified when followed shows publish new episodes', s.episodeAlerts);
}

function renderSmartQueueToggles(u, plan, s) {
  var el = document.getElementById('sq-toggles');
  if (!el) return;
  var limitNote = plan === 'creator' ? 'Up to 5 shows · counts toward monthly limit' : 'Unlimited shows · never counts toward limit';
  el.innerHTML = toggle('smartQueueEnabled', 'Auto-analyze new episodes', limitNote, s.smartQueueEnabled);
}

function renderAnalysisToggles(plan, s) {
  var el = document.getElementById('analysis-toggles');
  if (!el) return;
  var html = '<div class="toggle-row"><div><div class="toggle-label">Default analysis depth</div><div class="toggle-sub">Quick (~30s) or Deep (~3 min full transcript)</div></div>'
    + '<div style="display:flex;gap:8px">'
    + '<label style="display:flex;align-items:center;gap:6px;font-size:13px;cursor:pointer"><input type="radio" name="analysisDepth" value="standard" ' + (s.analysisDepth !== 'deep' ? 'checked' : '') + '> Standard</label>'
    + '<label style="display:flex;align-items:center;gap:6px;font-size:13px;cursor:pointer"><input type="radio" name="analysisDepth" value="deep" ' + (s.analysisDepth === 'deep' ? 'checked' : '') + '> Deep</label>'
    + '</div></div>'
    + toggle('audioBriefings', 'Audio briefings', '90-second spoken summary of each episode', s.audioBriefings)
    + toggle('liveSubtitles', 'Live subtitles', 'Show subtitles while playing the audio briefing', s.liveSubtitles);
  if (['operator','studio'].includes(plan)) {
    html += toggle('voiceAssistant', 'Voice assistant', 'Ask questions about the episode by voice', s.voiceAssistant);
  }
  el.innerHTML = html;
}

function toggle(id, label, sub, checked) {
  return '<div class="toggle-row"><div><div class="toggle-label">' + escHtml(label) + '</div>'
    + '<div class="toggle-sub">' + escHtml(sub) + '</div></div>'
    + '<label class="bt-switch"><input type="checkbox" id="toggle-' + id + '"' + (checked ? ' checked' : '') + '>'
    + '<span class="bt-track"></span></label></div>';
}

async function saveSettings() {
  var u = plUser();
  if (!u) return;
  var btn = document.getElementById('save-settings-btn');
  btn.disabled = true;
  btn.innerHTML = '<span class="spin"></span> Saving…';
  var payload = { userId: u.id };
  ['digestEmail','episodeAlerts','smartQueueEnabled','audioBriefings','liveSubtitles','voiceAssistant'].forEach(function(k) {
    var el = document.getElementById('toggle-' + k);
    if (el) payload[k] = el.checked;
  });
  var depthEl = document.querySelector('input[name="analysisDepth"]:checked');
  if (depthEl) payload['analysisDepth'] = depthEl.value;
  try {
    var res = await fetch('/api/update-settings', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload),
    });
    var data = await res.json();
    if (!res.ok || data.error) throw new Error(data.error || 'Save failed');
    showToast('Settings saved');
  } catch(e) {
    showToast(e.message || 'Save failed', true);
  } finally {
    btn.disabled = false;
    btn.textContent = 'Save settings';
  }
}

// ── BILLING TAB ──────────────────────────────────────────────────────────────

async function renderBillingTab(u) {
  var plan = (u.plan || 'free').toLowerCase();
  var isTrial = plan === 'trial';
  var pane = document.getElementById('pane-billing');

  if (isSuperAdmin(u)) {
    pane.innerHTML = '<div class="section">'
      + '<div class="plan-hero"><div class="plan-hero-badge" style="background:#dc2626;color:#fff">Admin</div>'
      + '<div><div class="plan-hero-name">Super Admin</div>'
      + '<div class="plan-hero-meta">Operator Lens — complimentary access</div></div></div>'
      + '<div class="info-row"><span class="info-label">Email</span><span class="info-val">' + escHtml(u.email || '') + '</span></div>'
      + '<div class="info-row"><span class="info-label">Access</span><span class="info-val">All features unlocked</span></div>'
      + '</div>';
    return;
  }

  var planLabel = { free:"Listener", trial:"Trial", creator:"Starter Lens", operator:"Pro Lens", studio:"Operator Lens" }[plan] || 'Listener';
  var badgeStyle = PLAN_BADGES[plan] || PLAN_BADGES.free;
  var trialEnd = isTrial && u.trialEndsAt ? formatDate(u.trialEndsAt) : null;
  var periodEnd = u.currentPeriodEnd ? formatDate(u.currentPeriodEnd) : null;
  var isPaid = ['creator','operator','studio'].includes(plan);

  var heroMeta = isTrial
    ? 'Free trial &mdash; full access through <strong>' + trialEnd + '</strong>'
    : isPaid && periodEnd
      ? 'Renews on <strong>' + periodEnd + '</strong>'
      : 'Free forever &mdash; 3 analyses per month';

  var html = '<div class="section"><div class="section-title">Current plan</div>'
    + '<div class="plan-hero"><div class="plan-hero-badge" style="' + badgeStyle + '">' + planLabel + '</div>'
    + '<div><div class="plan-hero-name">' + planLabel + ' Plan</div>'
    + '<div class="plan-hero-meta">' + heroMeta + '</div></div></div>';

  if (isPaid) {
    html += '<div class="btn-row"><button class="btn-primary" id="billing-portal-btn" onclick="openBillingPortal()">Manage billing &#8599;</button></div>';
  }
  html += '</div>';

  // Tier comparison
  html += '<div class="section"><div class="section-title">Compare plans</div><div class="tier-grid">';
  TIERS.forEach(function(t) {
    var isCurrent = (plan === t.key) || (isTrial && t.key === 'free');
    var isHigher = tierRank(t.key) > tierRank(plan === 'trial' ? 'free' : plan);
    var isLower  = tierRank(t.key) < tierRank(plan === 'trial' ? 'free' : plan);

    var cta = '';
    if (isCurrent || (isTrial && t.key === 'free')) {
      cta = '<span class="tc-cta current-badge">Current plan</span>';
    } else if (t.key === 'studio') {
      cta = '<a href="mailto:hello@podlens.app?subject=Operator Lens plan enquiry" class="tc-cta">Contact us &rarr;</a>';
    } else if (isHigher) {
      var hasPrice = PODLENS_PRICES[t.key + '_monthly'];
      cta = hasPrice
        ? '<button class="tc-cta" onclick="startCheckout(\'' + t.key + '\')">Upgrade &rarr;</button>'
        : '<button class="tc-cta" onclick="startCheckout(\'' + t.key + '\')">Upgrade &rarr;</button>';
    } else if (isLower) {
      cta = '<button class="tc-cta downgrade" onclick="openBillingPortal()">Downgrade</button>';
    }

    html += '<div class="tier-card' + (isCurrent ? ' current' : '') + '">'
      + (isCurrent ? '<div class="tc-badge">Current</div>' : '')
      + '<div class="tc-name">' + t.name + '</div>'
      + '<div class="tc-price">' + t.price + '</div>'
      + '<div class="tc-period">' + t.period + '</div>'
      + cta
      + '</div>';
  });
  html += '</div></div>';
  pane.innerHTML = html;

  // Sync plan from Stripe
  try {
    var syncRes = await fetch('/api/get-plan?userId=' + encodeURIComponent(u.id));
    var syncData = await syncRes.json();
    if (syncData.plan && syncData.plan !== u.plan) {
      u.plan = syncData.plan;
      if (syncData.currentPeriodEnd) u.currentPeriodEnd = syncData.currentPeriodEnd;
      setPlUser(u);
    }
  } catch {}
}

function tierRank(key) {
  return { free: 0, trial: 1, creator: 2, operator: 3, studio: 4 }[key] || 0;
}

async function startCheckout(planKey) {
  var u = plUser();
  if (!u) { window.location.href = '/?signup=1'; return; }
  var priceId = PODLENS_PRICES[planKey + '_monthly'];
  var btn = event && event.target;
  if (btn) { btn.disabled = true; btn.textContent = 'Redirecting…'; }
  try {
    var res = await fetch('/api/create-checkout', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ priceId: priceId, userEmail: u.email, userId: u.id, planName: planKey }),
    });
    var data = await res.json();
    if (data.url) {
      window.location.href = data.url;
    } else {
      showToast(data.error || 'Checkout failed', true);
      if (btn) { btn.disabled = false; btn.textContent = 'Upgrade →'; }
    }
  } catch {
    showToast('Network error. Please try again.', true);
    if (btn) { btn.disabled = false; btn.textContent = 'Upgrade →'; }
  }
}

async function openBillingPortal() {
  var u = plUser();
  if (!u) return;
  var btn = document.getElementById('billing-portal-btn');
  if (btn) { btn.disabled = true; btn.textContent = 'Opening…'; }
  try {
    var res = await fetch('/api/billing-portal', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ userId: u.id }),
    });
    var data = await res.json();
    if (data.url) window.location.href = data.url;
    else showToast(data.error || 'Could not open portal', true);
  } catch { showToast('Network error', true); }
  finally { if (btn) { btn.disabled = false; btn.textContent = 'Manage billing ↗'; } }
}

// ── DELETE ACCOUNT ────────────────────────────────────────────────────────────

function openDeleteModal() {
  document.getElementById('delete-modal').classList.remove('hidden');
}
function closeDeleteModal() {
  document.getElementById('delete-modal').classList.add('hidden');
}
async function confirmDelete() {
  var u = plUser();
  if (!u) return;
  var btn = document.getElementById('confirm-delete-btn');
  btn.disabled = true;
  btn.textContent = 'Deleting…';
  try {
    var res = await fetch('/api/account-delete', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ userId: u.id }),
    });
    var data = await res.json();
    if (!res.ok || data.error) throw new Error(data.error || 'Delete failed');
    setPlUser(null);
    window.location.href = '/?deleted=true';
  } catch(e) {
    showToast(e.message || 'Delete failed', true);
    btn.disabled = false;
    btn.textContent = 'Delete my account';
  }
}

// ── MAIN ─────────────────────────────────────────────────────────────────────

async function init() {
  var u = plUser();
  if (!u || !u.id) {
    document.getElementById('account-root').innerHTML = '<div class="section" style="text-align:center;padding:40px 24px">'
      + '<div style="font-family:var(--ffs);font-size:22px;font-weight:700;margin-bottom:8px">Sign in to manage your account</div>'
      + '<div style="font-size:14px;color:var(--text2);margin-bottom:24px">Your profile, settings, and billing live here.</div>'
      + '<a class="btn-primary" href="/">Go to Podlens &rarr;</a></div>';
    return;
  }

  var plan = (u.plan || 'free').toLowerCase();

  // Handle ?upgraded= redirect
  var params = new URLSearchParams(window.location.search);
  if (params.get('upgraded') === 'true') {
    await new Promise(function(r){ setTimeout(r, 1500); });
    try {
      var sr = await fetch('/api/get-plan?userId=' + encodeURIComponent(u.id));
      var sd = await sr.json();
      if (sd.plan) { u.plan = sd.plan; if (sd.currentPeriodEnd) u.currentPeriodEnd = sd.currentPeriodEnd; setPlUser(u); plan = u.plan.toLowerCase(); }
    } catch {}
    showToast('Plan upgraded — welcome to ' + (u.plan || ''));
    var cleanUrl = new URL(window.location.href);
    cleanUrl.searchParams.delete('upgraded');
    cleanUrl.searchParams.delete('session_id');
    history.replaceState({}, '', cleanUrl.toString());
  }

  // Render shell with tabs
  var adminTab = isSuperAdmin(u) ? '<button class="tab" data-tab="admin" onclick="switchTab(\'admin\')">Admin</button>' : '';
  document.getElementById('account-root').innerHTML =
    '<div class="tabs">'
    + '<button class="tab" data-tab="profile" onclick="switchTab(\'profile\')">Profile</button>'
    + '<button class="tab" data-tab="settings" onclick="switchTab(\'settings\')">Settings</button>'
    + '<button class="tab" data-tab="billing" onclick="switchTab(\'billing\')">Billing &amp; Plans</button>'
    + adminTab
    + '</div>'
    + '<div class="tab-pane active" id="pane-profile"></div>'
    + '<div class="tab-pane" id="pane-settings"></div>'
    + '<div class="tab-pane" id="pane-billing"></div>'
    + (isSuperAdmin(u) ? '<div class="tab-pane" id="pane-admin"><div class="section"><div class="section-title">Admin</div><div style="font-size:14px;color:var(--text2)">Admin panel available at <a href="/">the main app</a> — click the 🔴 Admin link in the nav dropdown.</div></div></div>' : '');

  // Load profile data
  var profile = {};
  try {
    var pr = await fetch('/api/get-settings?userId=' + encodeURIComponent(u.id) + '&type=profile');
    // Profile is stored separately — use name from user object for now
    profile = { name: u.name || '', bio: '' };
  } catch {}

  // Render all tabs
  renderProfileTab(u, profile);
  await renderSettingsTab(u, plan);
  await renderBillingTab(u);

  // Activate correct tab from URL
  var tab = currentTab();
  renderActiveTab(tab);
}

document.addEventListener('DOMContentLoaded', init);
window.addEventListener('popstate', function() { renderActiveTab(currentTab()); });
</script>
