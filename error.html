<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Temporarily Unavailable — Podlens</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0A0F1E;color:#F9FAFB;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
    .wrap{text-align:center;max-width:480px}
    .brand{font-size:1rem;font-weight:800;letter-spacing:.1em;color:#818CF8;margin-bottom:48px}
    .code{font-size:6rem;font-weight:800;color:#1F2937;line-height:1;margin-bottom:16px}
    h1{font-size:1.4rem;font-weight:700;margin-bottom:12px}
    p{color:#9CA3AF;line-height:1.6;margin-bottom:32px}
    a{display:inline-block;padding:12px 28px;background:#818CF8;color:#fff;text-decoration:none;border-radius:10px;font-weight:600}
    a:hover{background:#6366F1}
    .ref{margin-top:48px;font-size:.7rem;color:#374151;font-family:monospace}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="brand">⬡ PODLENS</div>
    <div class="code">503</div>
    <h1>Temporarily unavailable</h1>
    <p>This page is temporarily unavailable. Please try again in a moment.</p>
    <a href="/">Go to Podlens →</a>
    <div class="ref" id="r"></div>
  </div>
  <script>
    const c='ABCDEFGHJKLMNPQRSTUVWXYZ23456789'
    let r='PL-'
    for(let i=0;i<6;i++)r+=c[Math.floor(Math.random()*c.length)]
    document.getElementById('r').textContent='Ref: '+r
  </script>
</body>
</html>
