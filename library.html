<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Your Library — Podlens</title>
<meta name="description" content="Your followed shows, analyzed episodes, saved content, and downloads.">
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<script>
  // Library is now an inline view in the main SPA (index.html).
  // Redirect preserving any hash fragment for deep links.
  var hash = window.location.hash || '';
  window.location.replace('/?view=library' + (hash ? '&tab=' + hash.replace('#','') : ''));
</script>
</head>
<body>
<p>Redirecting to your library&hellip;</p>
</body>
</html>
