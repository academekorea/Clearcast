<script>(function(){var s=localStorage.getItem('podlens-mode')||localStorage.getItem('pl-theme');if(s==='light'){document.documentElement.setAttribute('data-theme','light');}else if(s==='dark'){document.documentElement.setAttribute('data-theme','dark');}})()</script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#FAF9F6;--bg2:#FFFFFF;--bg3:#F0EFE9;--bg4:#E5E4DE;
  --text:#1a1a1a;--text2:#555;--text3:#999;--navy:#0f2027;
  --border:rgba(0,0,0,0.08);--border2:rgba(0,0,0,0.14);
  --left:#E24B4A;--center:#D1CFC9;--right:#378ADD;
  --ff:'Inter',-apple-system,sans-serif;--ffs:'Playfair Display',Georgia,serif;--r:6px;
  --shadow:0 1px 3px rgba(0,0,0,.06),0 1px 2px rgba(0,0,0,.04);
}
[data-theme="dark"]{
  --bg:#0D0D0D;--bg2:#161616;--bg3:#1F1F1F;--bg4:#2A2A2A;
  --text:#FAF9F6;--text2:#888;--text3:#555;
  --border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.13);
  --shadow:0 1px 3px rgba(0,0,0,.3),0 1px 2px rgba(0,0,0,.2);
}
@media(prefers-color-scheme:dark){:root:not([data-theme="light"]){
  --bg:#0D0D0D;--bg2:#161616;--bg3:#1F1F1F;--bg4:#2A2A2A;
  --text:#FAF9F6;--text2:#888;--text3:#555;
  --border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.13);
  --shadow:0 1px 3px rgba(0,0,0,.3),0 1px 2px rgba(0,0,0,.2);
}}
html{scroll-behavior:smooth}
body{font-family:var(--ff);background:var(--bg);color:var(--text);min-height:100vh;-webkit-font-smoothing:antialiased}
a{color:var(--navy);text-decoration:none}
[data-theme="dark"] a{color:var(--text)}

/* ── NAV ── */
nav{display:flex;align-items:center;padding:0 24px;height:60px;border-bottom:1px solid var(--border);background:var(--bg);position:sticky;top:0;z-index:200;gap:8px}
.pl-lockup{display:inline-flex;align-items:center;gap:10px;text-decoration:none;flex-shrink:0}
.pl-lockup-icon{width:28px;height:28px;flex-shrink:0;border-radius:6px;display:block}
.pl-lockup-divider{width:1px;height:30px;background:var(--border2);flex-shrink:0}
.pl-lockup-text{display:flex;flex-direction:column;gap:3px;line-height:1}
.pl-lockup-wm{font-family:var(--ffs);font-size:18px;line-height:1;color:var(--navy);letter-spacing:0;display:block}
[data-theme="dark"] .pl-lockup-wm{color:var(--text)}
.pl-wm-pod{font-weight:400}.pl-wm-lens{font-weight:700}
.pl-lockup-tagline{display:block;font-size:9.5px;color:var(--text3);letter-spacing:.02em;line-height:1.3;white-space:nowrap}
@media(max-width:480px){.pl-lockup-divider,.pl-lockup-text{display:none}.pl-lockup-icon{width:30px;height:30px}}

/* ── PAGE ── */
.page{max-width:1100px;margin:0 auto;padding:40px 80px 80px}
@media(max-width:1024px){.page{padding:32px 24px 60px}}
.page-header{margin-bottom:28px}
.page-title{font-family:var(--ffs);font-size:28px;font-weight:700;letter-spacing:-.01em}
.page-sub{font-size:14px;color:var(--text2);margin-top:4px}

/* ── SEARCH ── */
.lib-search{position:relative;margin-bottom:20px}
.lib-search-input{width:100%;padding:10px 16px 10px 38px;border:1px solid var(--border2);border-radius:var(--r);font-size:14px;background:var(--bg2);color:var(--text);font-family:var(--ff);outline:none;transition:border-color .15s}
.lib-search-input:focus{border-color:var(--navy)}
.lib-search-icon{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--text3);font-size:14px;pointer-events:none}

/* ── TABS ── */
.lib-tabs{display:flex;gap:0;border-bottom:1px solid var(--border2);margin-bottom:24px;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.lib-tabs::-webkit-scrollbar{display:none}
.lib-tab{padding:10px 20px;font-size:13px;font-weight:500;color:var(--text2);background:none;border:none;cursor:pointer;font-family:var(--ff);border-bottom:2px solid transparent;white-space:nowrap;transition:color .12s,border-color .12s;margin-bottom:-1px;position:relative;top:1px}
.lib-tab:hover{color:var(--text)}
.lib-tab.active{color:var(--navy);font-weight:600;border-bottom-color:var(--navy)}
[data-theme="dark"] .lib-tab.active{color:var(--text);border-bottom-color:var(--text)}
.lib-tab .tab-count{font-size:10px;font-weight:600;background:var(--bg3);color:var(--text3);padding:1px 5px;border-radius:10px;margin-left:5px;font-family:var(--ff)}
.lib-tab.active .tab-count{background:var(--navy);color:#fff}
[data-theme="dark"] .lib-tab.active .tab-count{background:var(--text);color:var(--bg)}

/* ── TAB PANELS ── */
.lib-panel{display:none;animation:fadeIn .18s ease}
.lib-panel.active{display:block}
@keyframes fadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}

/* ── SKELETON SHIMMER ── */
@keyframes shimmer{0%{background-position:-400px 0}100%{background-position:400px 0}}
.skel{background:linear-gradient(90deg,var(--bg3) 25%,var(--bg4) 50%,var(--bg3) 75%);background-size:800px 100%;animation:shimmer 1.5s ease-in-out infinite;border-radius:var(--r)}

/* ── FOLLOWING GRID ── */
.following-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
@media(max-width:900px){.following-grid{grid-template-columns:repeat(2,1fr)}}
@media(max-width:520px){.following-grid{grid-template-columns:1fr}}

.show-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:16px;display:flex;flex-direction:column;gap:12px;position:relative;transition:border-color .12s,box-shadow .12s}
.show-card:hover{border-color:var(--border2);box-shadow:var(--shadow)}
.show-card-top{display:flex;gap:12px;align-items:flex-start}
.show-art-lg{width:72px;height:72px;border-radius:6px;object-fit:cover;flex-shrink:0;background:var(--bg3)}
.show-art-lg-ph{width:72px;height:72px;border-radius:6px;background:var(--navy);display:flex;align-items:center;justify-content:center;font-family:var(--ffs);font-size:22px;font-weight:700;color:#fff;flex-shrink:0}
.show-info{flex:1;min-width:0}
.show-name{font-size:13px;font-weight:600;line-height:1.35;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;margin-bottom:2px}
.show-host{font-size:11px;color:var(--text3);margin-bottom:6px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.show-latest-ep{font-size:11px;color:var(--text2);display:-webkit-box;-webkit-line-clamp:1;-webkit-box-orient:vertical;overflow:hidden;line-height:1.4}
.show-card-footer{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.bias-pill{font-size:10px;font-weight:600;padding:3px 8px;border-radius:999px;white-space:nowrap}
.bias-pill.left{color:#378ADD;background:rgba(55,138,221,.12)}
.bias-pill.right{color:#E24B4A;background:rgba(226,75,74,.12)}
.bias-pill.balanced{color:#16a34a;background:rgba(22,163,74,.12)}
.bias-pill.lightly-left{color:#60a5fa;background:rgba(96,165,250,.12)}
.bias-pill.lightly-right{color:#f87171;background:rgba(248,113,113,.12)}
.bias-pill.amber{color:#d97706;background:rgba(217,119,6,.12)}
.sq-toggle-wrap{display:flex;align-items:center;gap:5px;margin-left:auto;flex-shrink:0}
.sq-label{font-size:10px;color:var(--text3)}
.sq-toggle{position:relative;width:28px;height:16px;cursor:pointer;flex-shrink:0}
.sq-toggle input{opacity:0;width:0;height:0;position:absolute}
.sq-slider{position:absolute;inset:0;background:var(--bg4);border-radius:999px;transition:background .2s}
.sq-slider:before{content:'';position:absolute;width:12px;height:12px;left:2px;bottom:2px;background:#fff;border-radius:50%;transition:transform .2s}
.sq-toggle input:checked + .sq-slider{background:var(--navy)}
.sq-toggle input:checked + .sq-slider:before{transform:translateX(12px)}
.show-actions{display:flex;gap:6px;flex-wrap:wrap}
.btn-analyze{padding:6px 14px;background:var(--navy);color:#fff;border:none;border-radius:var(--r);font-size:11px;font-weight:600;cursor:pointer;font-family:var(--ff);transition:opacity .15s;white-space:nowrap}
.btn-analyze:hover{opacity:.85}
.btn-unfollow{padding:6px 10px;background:transparent;color:var(--text3);border:1px solid var(--border2);border-radius:var(--r);font-size:11px;cursor:pointer;font-family:var(--ff);transition:all .15s}
.btn-unfollow:hover{color:#dc2626;border-color:#dc2626}

/* ── USAGE METER ── */
.usage-meter{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:14px 16px;margin-bottom:20px;display:flex;align-items:center;gap:14px;flex-wrap:wrap}
.usage-label{font-size:13px;font-weight:500;flex-shrink:0}
.usage-track{flex:1;min-width:120px;height:6px;background:var(--bg3);border-radius:3px;overflow:hidden}
.usage-fill{height:100%;border-radius:3px;transition:width .4s ease;background:#22c55e}
.usage-fill.amber{background:#f59e0b}
.usage-fill.red{background:#ef4444}
.usage-pct{font-size:11px;color:var(--text3);flex-shrink:0;white-space:nowrap}
.usage-upgrade{font-size:11px;font-weight:600;color:#ef4444;text-decoration:none;flex-shrink:0}

/* ── ANALYZED LIST ── */
.ep-list{display:flex;flex-direction:column;gap:8px}
.ep-row{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:12px 16px;display:flex;align-items:center;gap:12px;transition:border-color .1s}
.ep-row:hover{border-color:var(--border2)}
.ep-art-sm{width:48px;height:48px;border-radius:4px;object-fit:cover;flex-shrink:0;background:var(--bg3)}
.ep-art-sm-ph{width:48px;height:48px;border-radius:4px;background:var(--navy);display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;color:#fff;font-family:var(--ffs);flex-shrink:0}
.ep-body{flex:1;min-width:0}
.ep-show-name{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.07em;color:var(--text3);margin-bottom:2px}
.ep-title{font-size:13px;font-weight:600;line-height:1.3;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:3px}
.ep-meta{font-size:11px;color:var(--text3);display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.ep-actions{display:flex;gap:6px;flex-shrink:0;align-items:center}
.btn-view{padding:6px 12px;background:var(--navy);color:#fff;border:none;border-radius:var(--r);font-size:11px;font-weight:600;cursor:pointer;font-family:var(--ff);white-space:nowrap;text-decoration:none;display:inline-block}
.btn-view:hover{opacity:.85;color:#fff}
.btn-reanalyze{padding:6px 12px;background:transparent;color:var(--text2);border:1px solid var(--border2);border-radius:var(--r);font-size:11px;cursor:pointer;font-family:var(--ff);white-space:nowrap;transition:all .1s}
.btn-reanalyze:hover{border-color:var(--navy);color:var(--navy)}

/* ── SAVED GRID ── */
.saved-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
@media(max-width:900px){.saved-grid{grid-template-columns:repeat(2,1fr)}}
@media(max-width:520px){.saved-grid{grid-template-columns:1fr}}
.saved-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:14px;display:flex;gap:12px;align-items:flex-start;transition:border-color .1s}
.saved-card:hover{border-color:var(--border2)}
.saved-art{width:56px;height:56px;border-radius:4px;object-fit:cover;flex-shrink:0;background:var(--bg3)}
.saved-art-ph{width:56px;height:56px;border-radius:4px;background:var(--navy);display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:700;color:#fff;font-family:var(--ffs);flex-shrink:0}
.saved-info{flex:1;min-width:0}
.saved-show{font-size:10px;color:var(--text3);margin-bottom:2px;text-transform:uppercase;letter-spacing:.06em;font-weight:600}
.saved-title{font-size:12px;font-weight:600;line-height:1.35;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;margin-bottom:8px}
.saved-card-actions{display:flex;gap:6px}
.btn-remove{padding:4px 8px;background:transparent;color:var(--text3);border:1px solid var(--border2);border-radius:var(--r);font-size:10px;cursor:pointer;font-family:var(--ff);transition:all .1s}
.btn-remove:hover{color:#dc2626;border-color:#dc2626}

/* ── DOWNLOADS ── */
.dl-list{display:flex;flex-direction:column;gap:8px}
.dl-row{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:12px 16px;display:flex;align-items:center;gap:12px}
.dl-art{width:44px;height:44px;border-radius:4px;object-fit:cover;flex-shrink:0;background:var(--bg3)}
.dl-body{flex:1;min-width:0}
.dl-title{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:2px}
.dl-meta{font-size:11px;color:var(--text3)}
.dl-player{display:flex;align-items:center;gap:8px;flex-shrink:0}
.dl-play-btn{width:32px;height:32px;border-radius:50%;background:var(--navy);color:#fff;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:12px;flex-shrink:0;transition:opacity .15s}
.dl-play-btn:hover{opacity:.85}
.btn-del{padding:5px 10px;background:transparent;color:var(--text3);border:1px solid var(--border2);border-radius:var(--r);font-size:11px;cursor:pointer;font-family:var(--ff);transition:all .1s}
.btn-del:hover{color:#dc2626;border-color:#dc2626}
.upgrade-gate{text-align:center;padding:60px 24px;background:var(--bg2);border:1px solid var(--border);border-radius:var(--r)}
.upgrade-gate-icon{font-size:36px;margin-bottom:12px}
.upgrade-gate-title{font-size:16px;font-weight:600;margin-bottom:8px}
.upgrade-gate-sub{font-size:13px;color:var(--text2);margin-bottom:20px;max-width:360px;margin-left:auto;margin-right:auto;line-height:1.6}
.btn-upgrade{display:inline-block;padding:10px 24px;background:var(--navy);color:#fff;border-radius:999px;font-size:13px;font-weight:600;text-decoration:none}
.btn-upgrade:hover{opacity:.85;color:#fff}

/* ── EMPTY STATES ── */
.empty-state{text-align:center;padding:64px 24px}
.empty-icon{font-size:40px;margin-bottom:14px}
.empty-title{font-size:17px;font-weight:600;margin-bottom:8px}
.empty-sub{font-size:13px;color:var(--text2);max-width:340px;margin:0 auto 20px;line-height:1.6}
.btn-cta{display:inline-block;padding:10px 24px;background:var(--navy);color:#fff;border-radius:var(--r);font-size:13px;font-weight:600;text-decoration:none;transition:opacity .15s}
.btn-cta:hover{opacity:.85;color:#fff}

/* ── ERROR STATE ── */
.error-banner{background:#fef2f2;border:1px solid #fecaca;border-radius:var(--r);padding:12px 16px;font-size:13px;color:#dc2626;margin-bottom:20px;display:none}
[data-theme="dark"] .error-banner{background:#2d1515;border-color:#7f1d1d;color:#fca5a5}

/* ── FOOTER ── */
footer{border-top:1px solid var(--border);padding:32px 24px;background:var(--bg2);text-align:center;font-size:12px;color:var(--text3)}
footer a{color:var(--text3)}footer a:hover{color:var(--text)}
</style>

<div class="page">
  <div id="error-banner" class="error-banner">Couldn't load your library. Try refreshing.</div>

  <div class="page-header">
    <div class="page-title">Your Library</div>
    <div class="page-sub">Shows you follow and episodes you've analyzed</div>
  </div>

  <!-- Search -->
  <div class="lib-search">
    <span class="lib-search-icon">🔍</span>
    <input type="text" class="lib-search-input" id="lib-search" placeholder="Search your library…" oninput="filterLib(this.value)">
  </div>

  <!-- Tabs -->
  <div class="lib-tabs" role="tablist">
    <button class="lib-tab active" id="tab-following" role="tab" aria-selected="true" onclick="switchTab('following')">Following <span class="tab-count" id="tc-following">0</span></button>
    <button class="lib-tab" id="tab-analyzed" role="tab" aria-selected="false" onclick="switchTab('analyzed')">Analyzed <span class="tab-count" id="tc-analyzed">0</span></button>
    <button class="lib-tab" id="tab-saved" role="tab" aria-selected="false" onclick="switchTab('saved')">Saved <span class="tab-count" id="tc-saved">0</span></button>

<script>
(function () {
  /* ── HELPERS ── */
  function plUser() { try { return JSON.parse(localStorage.getItem('pl-user') || 'null'); } catch (e) { return null; } }
  function esc(s) { return String(s || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;'); }
  function timeAgo(iso) {
    if (!iso) return '';
    var d = Math.floor((Date.now() - new Date(iso)) / 1000);
    if (d < 60) return 'just now';
    if (d < 3600) return Math.floor(d / 60) + 'm ago';
    if (d < 86400) return Math.floor(d / 3600) + 'h ago';
    if (d < 604800) return Math.floor(d / 86400) + 'd ago';
    return new Date(iso).toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
  }
  function biasPillClass(leftPct, rightPct) {
    var diff = Math.abs((leftPct || 0) - (rightPct || 0));
    if (diff < 20) return 'balanced';
    var dir = (leftPct || 0) > (rightPct || 0) ? 'left' : 'right';
    if (diff < 40) return 'lightly-' + dir;
    return dir;
  }
  function biasPillLabel(leftPct, rightPct) {
    var diff = Math.abs((leftPct || 0) - (rightPct || 0));
    if (diff < 20) return 'Mostly Balanced';
    var dir = (leftPct || 0) > (rightPct || 0) ? 'Left-Leaning' : 'Right-Leaning';
    if (diff < 40) return 'Lightly ' + dir;
    if (diff < 60) return dir;
    return 'Strongly ' + dir;
  }
  function biasFromEp(ep) {
    return biasPillLabel(ep.leftPct, ep.rightPct);
  }
  function biasCls(ep) {
    return biasPillClass(ep.leftPct, ep.rightPct);
  }
  function artHtml(src, name, cls) {
    var initial = (name || 'P').charAt(0).toUpperCase();
    var phCls = cls.replace('-', '-ph');
    if (src) {
      return '<img class="' + cls + '" src="' + esc(src) + '" alt="" loading="lazy" onerror="this.outerHTML=\'<div class=&quot;' + phCls + '&quot;>' + initial + '</div>\'">';
    }
    return '<div class="' + phCls + '">' + initial + '</div>';
  }

  /* ── DATA ── */
  var u = plUser();
  var follows = [];
  var analyses = [];
  var saved = [];
  var downloads = [];
  var activeTab = 'following';
  var searchQuery = '';

  function getPlanLimits() {
    if (!u) return { max: 3, label: 'week', unlimited: false };
    var plan = u.plan || 'free';
    if (plan === 'trial') return { max: 30, label: 'trial', unlimited: false };
    if (plan === 'creator') return { max: 25, label: 'week', unlimited: false };
    if (plan === 'operator') return { max: 100, label: 'week', unlimited: false };
    if (plan === 'studio') return { max: 0, label: '', unlimited: true };
    return { max: 3, label: 'week', unlimited: false };
  }

  /* ── AUTH GATE ── */
  if (!u || !u.id) {
    sessionStorage.setItem('pl-auth-toast', 'Sign in to access your Library');
    window.location.href = '/';
    return;
  }

  /* ── LOAD DATA ── */
  function loadData() {
    try {
      follows = (u.followedShows || []).slice();
      analyses = (u.analyzedEpisodes || []).slice().sort(function (a, b) {
        return new Date(b.analyzedAt || 0) - new Date(a.analyzedAt || 0);
      });
    } catch (e) { }
    try { saved = JSON.parse(localStorage.getItem('pl-saved-episodes') || '[]'); } catch (e) { saved = []; }
    try { downloads = JSON.parse(localStorage.getItem('pl-downloads') || '[]'); } catch (e) { downloads = []; }

    // Update tab counts
    document.getElementById('tc-following').textContent = follows.length;
    document.getElementById('tc-analyzed').textContent = analyses.length;
    document.getElementById('tc-saved').textContent = saved.length;
    document.getElementById('tc-downloads').textContent = downloads.length;

    renderAll();
  }

  /* ── RENDER ── */
  function renderAll() {
    renderFollowing();
    renderAnalyzed();
    renderSaved();
    renderDownloads();
  }

  function applySearch(arr, fields) {
    if (!searchQuery) return arr;
    var q = searchQuery.toLowerCase();
    return arr.filter(function (item) {
      return fields.some(function (f) { return (item[f] || '').toLowerCase().includes(q); });
    });
  }

  /* Following */
  function renderFollowing() {
    var el = document.getElementById('following-content');
    var items = applySearch(follows, ['name', 'host', 'latestEp']);
    if (!items.length) {
      el.innerHTML = '<div class="empty-state">'
        + '<div class="empty-icon">🎧</div>'
        + '<div class="empty-title">' + (follows.length ? 'No matching shows' : "You haven't followed any shows yet") + '</div>'
        + '<div class="empty-sub">' + (follows.length ? 'Try a different search term.' : 'Head to Discover to find podcasts to follow.') + '</div>'
        + (!follows.length ? '<a href="/" class="btn-cta">Go to Discover →</a>' : '')
        + '</div>';
      return;
    }
    var plan = u.plan || 'free';
    var showSQ = ['creator', 'operator', 'studio', 'trial'].includes(plan);
    el.innerHTML = '<div class="following-grid">' + items.map(function (s, i) {
      var sqId = 'sq-' + i;
      var sqChecked = s.smartQueue ? 'checked' : '';
      var sqHtml = showSQ
        ? '<div class="sq-toggle-wrap" title="Smart Queue — auto-analyze new episodes"><span class="sq-label">SQ</span><label class="sq-toggle"><input type="checkbox" ' + sqChecked + ' onchange="toggleSmartQueue(' + i + ',this.checked)"><span class="sq-slider"></span></label></div>'
        : '';
      var bias = s.bias || {};
      var pillCls = biasPillClass(bias.l, bias.r);
      var pillLabel = biasPillLabel(bias.l, bias.r);
      var analyzeUrl = s.feedUrl || s.youtubeUrl || '';
      return '<div class="show-card">'
        + '<div class="show-card-top">'
        + artHtml(s.artwork, s.name, 'show-art-lg')
        + '<div class="show-info">'
        + '<div class="show-name">' + esc(s.name || '') + '</div>'
        + '<div class="show-host">' + esc(s.host || '') + '</div>'
        + (s.latestEp ? '<div class="show-latest-ep">' + esc(s.latestEp) + '</div>' : '')
        + '</div>'
        + '</div>'
        + '<div class="show-card-footer">'
        + '<span class="bias-pill ' + pillCls + '">' + pillLabel + '</span>'
        + sqHtml
        + '</div>'
        + '<div class="show-actions">'
        + (analyzeUrl ? '<button class="btn-analyze" onclick="analyzeLatest(\'' + esc(analyzeUrl) + '\',\'' + esc(s.name || '') + '\')">Analyze latest →</button>' : '')
        + '<button class="btn-unfollow" onclick="unfollowShow(' + i + ')">Unfollow</button>'
        + '</div>'
        + '</div>';
    }).join('') + '</div>';
  }

  /* Analyzed */
  function renderAnalyzed() {
    var el = document.getElementById('analyzed-content');
    var items = applySearch(analyses, ['episodeTitle', 'showName']);
    // Usage meter
    var lim = getPlanLimits();
    var used = u.analysesThisWeek || 0;
    var umHtml = '';
    if (!lim.unlimited) {
      var pct = Math.min(100, Math.round(used / lim.max * 100));
      var fillCls = pct >= 100 ? 'red' : pct >= 80 ? 'amber' : '';
      umHtml = '<div class="usage-meter">'
        + '<span class="usage-label">' + used + ' of ' + lim.max + ' analyses used this ' + lim.label + '</span>'
        + '<div class="usage-track"><div class="usage-fill ' + fillCls + '" style="width:' + pct + '%"></div></div>'
        + '<span class="usage-pct">' + pct + '%</span>'
        + (pct >= 80 ? '<a href="/pricing.html" class="usage-upgrade">Upgrade for more →</a>' : '')
        + '</div>';
    } else {
      umHtml = '<div class="usage-meter"><span class="usage-label" style="color:var(--text3)">Unlimited analyses</span></div>';
    }
    document.getElementById('usage-meter-wrap').innerHTML = umHtml;

    if (!items.length) {
      el.innerHTML = '<div class="empty-state">'
        + '<div class="empty-icon">📊</div>'
        + '<div class="empty-title">' + (analyses.length ? 'No matching analyses' : 'No analyses yet') + '</div>'
        + '<div class="empty-sub">' + (analyses.length ? 'Try a different search.' : 'Analyze any podcast episode to see it here.') + '</div>'
        + (!analyses.length ? '<a href="/" class="btn-cta">Analyze an episode →</a>' : '')
        + '</div>';
      return;
    }
    el.innerHTML = '<div class="ep-list">' + items.map(function (ep) {
      var pillCls = biasCls(ep);
      var pillLabel = ep.biasLabel || biasFromEp(ep);
      var viewUrl = ep.jobId ? '/?jobId=' + ep.jobId : '#';
      return '<div class="ep-row">'
        + artHtml(ep.artwork, ep.showName, 'ep-art-sm')
        + '<div class="ep-body">'
        + '<div class="ep-show-name">' + esc(ep.showName || '') + '</div>'
        + '<div class="ep-title">' + esc(ep.episodeTitle || 'Episode') + '</div>'
        + '<div class="ep-meta">'
        + (pillLabel ? '<span class="bias-pill ' + pillCls + '">' + pillLabel + '</span>' : '')
        + '<span>' + timeAgo(ep.analyzedAt) + '</span>'
        + '</div>'
        + '</div>'
        + '<div class="ep-actions">'
        + (ep.jobId ? '<a href="' + esc(viewUrl) + '" class="btn-view">View →</a>' : '')
        + (ep.url ? '<button class="btn-reanalyze" onclick="reAnalyze(\'' + esc(ep.url) + '\',\'' + esc(ep.episodeTitle || '') + '\',\'' + esc(ep.showName || '') + '\')">Re-analyze</button>' : '')
        + '</div>'
        + '</div>';
    }).join('') + '</div>';
  }

  /* Saved */
  function renderSaved() {
    var el = document.getElementById('saved-content');
    var items = applySearch(saved, ['episode_title', 'show_name']);
    if (!items.length) {
      el.innerHTML = '<div class="empty-state">'
        + '<div class="empty-icon">🔖</div>'
        + '<div class="empty-title">' + (saved.length ? 'No matching saved episodes' : 'Nothing saved yet') + '</div>'
        + '<div class="empty-sub">Save episodes from any show profile to analyze them later.</div>'
        + '</div>';
      return;
    }
    el.innerHTML = '<div class="saved-grid">' + items.map(function (ep, i) {
      var analyzeUrl = ep.episode_url || '';
      return '<div class="saved-card">'
        + artHtml(ep.artwork_url, ep.show_name, 'saved-art')
        + '<div class="saved-info">'
        + '<div class="saved-show">' + esc(ep.show_name || '') + '</div>'
        + '<div class="saved-title">' + esc(ep.episode_title || 'Episode') + '</div>'
        + '<div class="saved-card-actions">'
        + (analyzeUrl ? '<button class="btn-analyze" onclick="analyzeLatest(\'' + esc(analyzeUrl) + '\',\'' + esc(ep.show_name || '') + '\')">Analyze now →</button>' : '')
        + '<button class="btn-remove" onclick="removeSaved(' + i + ')">Remove</button>'
        + '</div>'
        + '</div>'
        + '</div>';
    }).join('') + '</div>';
  }

  /* Downloads */
  function renderDownloads() {
    var el = document.getElementById('downloads-content');
    var plan = u.plan || 'free';
    var hasAccess = ['creator', 'operator', 'studio', 'trial'].includes(plan);
    if (!hasAccess) {
      el.innerHTML = '<div class="upgrade-gate">'
        + '<div class="upgrade-gate-icon">🎧</div>'
        + '<div class="upgrade-gate-title">Audio briefings are available on Creator plan and above</div>'
        + '<div class="upgrade-gate-sub">Get 90-second spoken summaries of every episode you analyze, playable offline.</div>'
        + '<a href="/pricing.html" class="btn-upgrade">Upgrade to Creator →</a>'
        + '</div>';
      return;
    }
    var items = applySearch(downloads, ['title', 'show_name']);
    if (!items.length) {
      el.innerHTML = '<div class="empty-state">'
        + '<div class="empty-icon">📥</div>'
        + '<div class="empty-title">' + (downloads.length ? 'No matching downloads' : 'No downloads yet') + '</div>'
        + '<div class="empty-sub">Audio briefings you download will appear here.</div>'
        + '</div>';
      return;
    }
    el.innerHTML = '<div class="dl-list">' + items.map(function (dl, i) {
      return '<div class="dl-row">'
        + (dl.artwork ? '<img class="dl-art" src="' + esc(dl.artwork) + '" alt="">' : '<div class="dl-art" style="background:var(--navy)"></div>')
        + '<div class="dl-body">'
        + '<div class="dl-title">' + esc(dl.title || 'Audio Briefing') + '</div>'
        + '<div class="dl-meta">' + (dl.duration || '') + (dl.downloaded_at ? ' &middot; Downloaded ' + timeAgo(dl.downloaded_at) : '') + '</div>'
        + '</div>'
        + '<div class="dl-player">'
        + (dl.audio_url ? '<button class="dl-play-btn" onclick="playDownload(\'' + esc(dl.audio_url) + '\')">▶</button>' : '')
        + '<button class="btn-del" onclick="deleteDownload(' + i + ')">Delete</button>'
        + '</div>'
        + '</div>';
    }).join('') + '</div>';
  }

  /* ── TAB SWITCHING ── */
  window.switchTab = function (tab) {
    activeTab = tab;
    document.querySelectorAll('.lib-tab').forEach(function (t) {
      t.classList.toggle('active', t.id === 'tab-' + tab);
      t.setAttribute('aria-selected', t.id === 'tab-' + tab ? 'true' : 'false');
    });
    document.querySelectorAll('.lib-panel').forEach(function (p) {
      p.classList.toggle('active', p.id === 'panel-' + tab);
    });
  };

  /* ── SEARCH ── */
  window.filterLib = function (q) {
    searchQuery = q;
    if (activeTab === 'following') renderFollowing();
    else if (activeTab === 'analyzed') renderAnalyzed();
    else if (activeTab === 'saved') renderSaved();
    else renderDownloads();
  };

  /* ── ACTIONS ── */
  window.toggleSmartQueue = function (idx, val) {
    if (!u.followedShows[idx]) return;
    u.followedShows[idx].smartQueue = val;
    localStorage.setItem('pl-user', JSON.stringify(u));
    follows = u.followedShows.slice();
  };

  window.unfollowShow = function (idx) {
    if (!confirm('Unfollow "' + (follows[idx] && follows[idx].name || 'this show') + '"?')) return;
    u.followedShows.splice(idx, 1);
    localStorage.setItem('pl-user', JSON.stringify(u));
    follows = u.followedShows.slice();
    document.getElementById('tc-following').textContent = follows.length;
    renderFollowing();
  };

  window.analyzeLatest = function (url, showName) {
    window.location.href = '/?analyze=' + encodeURIComponent(url) + '&show=' + encodeURIComponent(showName || '');
  };

  window.reAnalyze = function (url, epTitle, showName) {
    window.location.href = '/?analyze=' + encodeURIComponent(url) + '&ep=' + encodeURIComponent(epTitle || '') + '&show=' + encodeURIComponent(showName || '');
  };

  window.removeSaved = function (idx) {
    saved.splice(idx, 1);
    localStorage.setItem('pl-saved-episodes', JSON.stringify(saved));
    document.getElementById('tc-saved').textContent = saved.length;
    renderSaved();
  };

  window.deleteDownload = function (idx) {
    downloads.splice(idx, 1);
    localStorage.setItem('pl-downloads', JSON.stringify(downloads));
    document.getElementById('tc-downloads').textContent = downloads.length;
    renderDownloads();
  };

  window.playDownload = function (url) {
    var audio = new Audio(url);
    audio.play().catch(function () { });
  };

  loadData();
})();
</script>
</body>
</html>
