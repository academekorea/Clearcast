<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Your Library — Podlens</title>
<meta name="description" content="Your followed shows, analyzed episodes, saved content, and downloads.">
<meta property="og:title" content="Your Library — Podlens">
<meta property="og:image" content="https://podlens.app/og-image.png">
<meta name="theme-color" content="#0f2027">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
<link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
<link rel="canonical" href="https://podlens.app/library">
<script src="/js/utils.js"></script>
<script>(function(){var s=localStorage.getItem('podlens-mode')||localStorage.getItem('pl-theme');if(s==='light'){document.documentElement.setAttribute('data-theme','light');}else if(s==='dark'){document.documentElement.setAttribute('data-theme','dark');}})()</script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#FAF9F6;--bg2:#FFFFFF;--bg3:#F0EFE9;--bg4:#E5E4DE;
  --text:#1a1a1a;--text2:#555;--text3:#999;--navy:#0f2027;
  --border:rgba(0,0,0,0.08);--border2:rgba(0,0,0,0.14);
  --left:#E24B4A;--center:#D1CFC9;--right:#378ADD;
  --ff:'Inter',-apple-system,sans-serif;--ffs:'Playfair Display',Georgia,serif;--r:6px;
  --shadow:0 1px 3px rgba(0,0,0,.06),0 1px 2px rgba(0,0,0,.04);
}
[data-theme="dark"]{
  --bg:#0D0D0D;--bg2:#161616;--bg3:#1F1F1F;--bg4:#2A2A2A;
  --text:#FAF9F6;--text2:#888;--text3:#555;
  --border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.13);
  --shadow:0 1px 3px rgba(0,0,0,.3),0 1px 2px rgba(0,0,0,.2);
}
@media(prefers-color-scheme:dark){:root:not([data-theme="light"]){
  --bg:#0D0D0D;--bg2:#161616;--bg3:#1F1F1F;--bg4:#2A2A2A;
  --text:#FAF9F6;--text2:#888;--text3:#555;
  --border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.13);
  --shadow:0 1px 3px rgba(0,0,0,.3),0 1px 2px rgba(0,0,0,.2);
}}
html{scroll-behavior:smooth}
body{font-family:var(--ff);background:var(--bg);color:var(--text);min-height:100vh;-webkit-font-smoothing:antialiased}
a{color:var(--navy);text-decoration:none}
[data-theme="dark"] a{color:var(--text)}

/* ── NAV ── */
nav{display:flex;align-items:center;padding:0 24px;height:60px;border-bottom:1px solid var(--border);background:var(--bg);position:sticky;top:0;z-index:200;gap:8px}
.pl-lockup{display:inline-flex;align-items:center;gap:10px;text-decoration:none;flex-shrink:0}
.pl-lockup-icon{width:28px;height:28px;flex-shrink:0;border-radius:6px;display:block}
.pl-lockup-divider{width:1px;height:30px;background:var(--border2);flex-shrink:0}
.pl-lockup-text{display:flex;flex-direction:column;gap:3px;line-height:1}
.pl-lockup-wm{font-family:var(--ffs);font-size:16px;line-height:1;color:var(--navy);letter-spacing:0;display:block}
[data-theme="dark"] .pl-lockup-wm{color:var(--text)}
.pl-wm-pod{font-weight:400}.pl-wm-lens{font-weight:700}
.pl-lockup-tagline{display:block;font-size:9.5px;color:var(--text3);letter-spacing:.02em;line-height:1.3;white-space:nowrap}
@media(max-width:480px){.pl-lockup-divider,.pl-lockup-text{display:none}.pl-lockup-icon{width:30px;height:30px}}

/* ── PAGE ── */
.page{display:grid;grid-template-columns:220px 1fr;min-height:calc(100vh - 60px);align-items:start;max-width:100%;padding:0;margin:0}
.page-inner{padding:32px 36px 80px;min-width:0}
.lib-nav{background:#0a1a20;display:flex;flex-direction:column;min-height:calc(100vh - 60px);position:sticky;top:60px}
.lib-nav *{color:#fff}
.lib-nav-lbl{padding:16px 20px 8px;font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;opacity:.4}
.lib-nav-btn{display:flex;align-items:center;gap:10px;padding:10px 20px;font-size:13px;border:none;background:transparent;width:100%;text-align:left;cursor:pointer;color:#fff;font-family:'Inter',-apple-system,sans-serif;text-decoration:none}
.lib-nav-btn:hover{background:rgba(255,255,255,.07)}
.lib-nav-btn.active{background:rgba(255,255,255,.13)}
.lib-nav-div{height:0.5px;background:rgba(255,255,255,.1);margin:4px 20px}
@media(max-width:768px){.page{grid-template-columns:1fr}.lib-nav{display:none}}
.page-header{margin-bottom:28px}
.page-title{font-family:var(--ffs);font-size:28px;font-weight:700;letter-spacing:-.01em}
.page-sub{font-size:14px;color:var(--text2);margin-top:4px}

/* ── SEARCH ── */
.lib-search{position:relative;margin-bottom:20px}
.lib-search-input{width:100%;padding:10px 16px 10px 38px;border:1px solid var(--border2);border-radius:var(--r);font-size:14px;background:var(--bg2);color:var(--text);font-family:var(--ff);outline:none;transition:border-color .15s}
.lib-search-input:focus{border-color:var(--navy)}
.lib-search-icon{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--text3);font-size:14px;pointer-events:none}

/* ── TAB PANELS ── */
.lib-panel{display:none;animation:fadeIn .18s ease}
.lib-panel.active{display:block}
@keyframes fadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}

/* ── SKELETON SHIMMER ── */
@keyframes shimmer{0%{background-position:-400px 0}100%{background-position:400px 0}}
.skel{background:linear-gradient(90deg,var(--bg3) 25%,var(--bg4) 50%,var(--bg3) 75%);background-size:800px 100%;animation:shimmer 1.5s ease-in-out infinite;border-radius:var(--r)}

/* ── FOLLOWING GRID ── */
@media(max-width:900px){}
@media(max-width:520px){}

.show-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:16px;display:flex;flex-direction:column;gap:12px;position:relative;transition:border-color .12s,box-shadow .12s}
.show-card:hover{border-color:var(--border2);box-shadow:var(--shadow)}
.show-card-top{display:flex;gap:12px;align-items:flex-start}
.show-art-lg{width:72px;height:72px;border-radius:6px;object-fit:cover;flex-shrink:0;background:var(--bg3)}
.show-art-lg-ph{width:72px;height:72px;border-radius:6px;background:var(--navy);display:flex;align-items:center;justify-content:center;font-family:var(--ffs);font-size:22px;font-weight:700;color:#fff;flex-shrink:0}
.show-info{flex:1;min-width:0}
.show-name{font-size:13px;font-weight:600;line-height:1.35;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;margin-bottom:2px}
.show-host{font-size:11px;color:var(--text3);margin-bottom:6px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.show-latest-ep{font-size:11px;color:var(--text2);display:-webkit-box;-webkit-line-clamp:1;-webkit-box-orient:vertical;overflow:hidden;line-height:1.4}
.show-card-footer{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.bias-pill{font-size:10px;font-weight:600;padding:3px 8px;border-radius:999px;white-space:nowrap}
.bias-pill.left{color:#378ADD;background:rgba(55,138,221,.12)}
.bias-pill.right{color:#E24B4A;background:rgba(226,75,74,.12)}
.bias-pill.balanced{color:#16a34a;background:rgba(22,163,74,.12)}
.bias-pill.lightly-left{color:#60a5fa;background:rgba(96,165,250,.12)}
.bias-pill.lightly-right{color:#f87171;background:rgba(248,113,113,.12)}
.bias-pill.amber{color:#d97706;background:rgba(217,119,6,.12)}
.sq-toggle-wrap{display:flex;align-items:center;gap:5px;margin-left:auto;flex-shrink:0}
.sq-label{font-size:10px;color:var(--text3)}
.sq-toggle{position:relative;width:28px;height:16px;cursor:pointer;flex-shrink:0}
.sq-toggle input{opacity:0;width:0;height:0;position:absolute}
.sq-slider{position:absolute;inset:0;background:var(--bg4);border-radius:999px;transition:background .2s}
.sq-slider:before{content:'';position:absolute;width:12px;height:12px;left:2px;bottom:2px;background:#fff;border-radius:50%;transition:transform .2s}
.sq-toggle input:checked + .sq-slider{background:var(--navy)}
.sq-toggle input:checked + .sq-slider:before{transform:translateX(12px)}
.show-actions{display:flex;gap:6px;flex-wrap:wrap}
.btn-analyze{padding:6px 14px;background:var(--navy);color:#fff;border:none;border-radius:var(--r);font-size:11px;font-weight:600;cursor:pointer;font-family:var(--ff);transition:opacity .15s;white-space:nowrap}
.btn-analyze:hover{opacity:.85}
.btn-unfollow{padding:6px 10px;background:transparent;color:var(--text3);border:1px solid var(--border2);border-radius:var(--r);font-size:11px;cursor:pointer;font-family:var(--ff);transition:all .15s}
.btn-unfollow:hover{color:#dc2626;border-color:#dc2626}

/* ── USAGE METER ── */
.usage-meter{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:14px 16px;margin-bottom:20px;display:flex;align-items:center;gap:14px;flex-wrap:wrap}
.usage-label{font-size:13px;font-weight:500;flex-shrink:0}
.usage-track{flex:1;min-width:120px;height:6px;background:var(--bg3);border-radius:3px;overflow:hidden}
.usage-fill{height:100%;border-radius:3px;transition:width .4s ease;background:#22c55e}
.usage-fill.amber{background:#f59e0b}
.usage-fill.red{background:#ef4444}
.usage-pct{font-size:11px;color:var(--text3);flex-shrink:0;white-space:nowrap}
.usage-upgrade{font-size:11px;font-weight:600;color:#ef4444;text-decoration:none;flex-shrink:0}

/* ── ANALYZED LIST ── */
.ep-list{display:flex;flex-direction:column;gap:8px}
.ep-row{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:12px 16px;display:flex;align-items:center;gap:12px;transition:border-color .1s}
.ep-row:hover{border-color:var(--border2)}
.ep-art-sm{width:48px;height:48px;border-radius:4px;object-fit:cover;flex-shrink:0;background:var(--bg3)}
.ep-art-sm-ph{width:48px;height:48px;border-radius:4px;background:var(--navy);display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;color:#fff;font-family:var(--ffs);flex-shrink:0}
.ep-body{flex:1;min-width:0}
.ep-show-name{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.07em;color:var(--text3);margin-bottom:2px}
.ep-title{font-size:13px;font-weight:600;line-height:1.3;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:3px}
.ep-meta{font-size:11px;color:var(--text3);display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.ep-actions{display:flex;gap:6px;flex-shrink:0;align-items:center}
.btn-view{padding:6px 12px;background:var(--navy);color:#fff;border:none;border-radius:var(--r);font-size:11px;font-weight:600;cursor:pointer;font-family:var(--ff);white-space:nowrap;text-decoration:none;display:inline-block}
.btn-view:hover{opacity:.85;color:#fff}
.btn-reanalyze{padding:6px 12px;background:transparent;color:var(--text2);border:1px solid var(--border2);border-radius:var(--r);font-size:11px;cursor:pointer;font-family:var(--ff);white-space:nowrap;transition:all .1s}
.btn-reanalyze:hover{border-color:var(--navy);color:var(--navy)}

/* ── EMPTY STATES ── */
.empty-state{text-align:center;padding:64px 24px}
.empty-icon{font-size:40px;margin-bottom:14px}
.empty-title{font-size:17px;font-weight:600;margin-bottom:8px}
.empty-sub{font-size:13px;color:var(--text2);max-width:340px;margin:0 auto 20px;line-height:1.6}
.btn-cta{display:inline-block;padding:10px 24px;background:var(--navy);color:#fff;border-radius:var(--r);font-size:13px;font-weight:600;text-decoration:none;transition:opacity .15s}
.btn-cta:hover{opacity:.85;color:#fff}

/* ── ERROR STATE ── */
.error-banner{background:#fef2f2;border:1px solid #fecaca;border-radius:var(--r);padding:12px 16px;font-size:13px;color:#dc2626;margin-bottom:20px;display:none}
[data-theme="dark"] .error-banner{background:#2d1515;border-color:#7f1d1d;color:#fca5a5}

/* ── FOOTER ── */
footer{border-top:1px solid var(--border);padding:32px 24px;background:var(--bg2);text-align:center;font-size:12px;color:var(--text3)}
footer a{color:var(--text3)}footer a:hover{color:var(--text)}

/* ── YOUR SHOWS (platform-connected) ── */

/* ── SIDEBAR DROPDOWN ── */
.lib-nav-sub{display:none;flex-direction:column}
.lib-nav-sub.open{display:flex}
.lib-nav-sub-btn{display:flex;align-items:center;gap:8px;padding:7px 20px 7px 38px;font-size:12px;border:none;background:transparent;width:100%;text-align:left;cursor:pointer;color:rgba(255,255,255,.4);font-family:'Inter',-apple-system,sans-serif;text-decoration:none;transition:background .12s,color .12s}
.lib-nav-sub-btn:hover{background:rgba(255,255,255,.05);color:rgba(255,255,255,.7)}
.lib-nav-sub-btn.active{color:rgba(255,255,255,.9);background:rgba(255,255,255,.07)}
.lib-nav-arrow{margin-left:auto;font-size:11px;color:rgba(255,255,255,.2);transition:transform .15s;line-height:1}
.lib-nav-arrow.open{transform:rotate(90deg)}
.lib-nav-count{margin-left:auto;font-size:10px;color:rgba(255,255,255,.22)}
.lib-nav-badge{margin-left:auto;font-size:9px;background:rgba(55,138,221,.3);color:#378ADD;padding:1px 5px;border-radius:10px}
.lib-nav-soon{margin-left:auto;font-size:9px;background:rgba(255,255,255,.08);color:rgba(255,255,255,.3);padding:1px 5px;border-radius:10px}


/* ── ARCHIVE — FOLLOWING ── */
.archive-search-wrap{position:relative;margin-bottom:12px}
.archive-search-wrap svg{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--text3);pointer-events:none}
.archive-search{width:100%;padding:8px 14px 8px 36px;border:1px solid var(--border2);border-radius:var(--r);font-size:13px;background:var(--bg2);color:var(--text);font-family:var(--ff);outline:none;transition:border-color .15s}
.archive-search:focus{border-color:var(--navy)}
.show-archive-block{margin-bottom:14px}
.show-archive-hd{display:flex;align-items:center;gap:12px;padding:12px 16px;background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);transition:border-color .12s}
.show-archive-hd.has-eps{border-radius:var(--r) var(--r) 0 0}
.sah-art{width:48px;height:48px;border-radius:7px;flex-shrink:0;object-fit:cover;background:var(--bg3)}
.sah-art-ph{width:48px;height:48px;border-radius:7px;flex-shrink:0;background:var(--navy);display:flex;align-items:center;justify-content:center;font-family:var(--ffs);font-size:16px;font-weight:700;color:#fff}
.sah-info{flex:1;min-width:0}
.sah-name{font-size:13px;font-weight:600;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sah-meta{font-size:11px;color:var(--text3)}
.sah-trend{width:56px;display:flex;align-items:flex-end;gap:2px;height:22px;flex-shrink:0}
.sah-trend-bar{flex:1;border-radius:2px 2px 0 0;min-height:3px}
.sah-actions{display:flex;align-items:center;gap:6px;flex-shrink:0}
.archive-ep-list{border:1px solid var(--border);border-top:none;border-radius:0 0 var(--r) var(--r);overflow:hidden}
.archive-ep{display:flex;align-items:center;gap:10px;padding:9px 16px;background:var(--bg2);border-top:1px solid var(--border);font-size:12px;cursor:pointer;transition:background .1s}
.archive-ep:hover{background:var(--bg3)}
.aep-num{width:18px;text-align:right;color:var(--text3);font-size:11px;flex-shrink:0}
.aep-title{flex:1;min-width:0;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--text)}
.aep-date{font-size:11px;color:var(--text3);flex-shrink:0;width:52px;text-align:right}
.archive-show-more{display:block;width:100%;padding:7px 16px;background:var(--bg);border:none;border-top:1px solid var(--border);font-size:11px;color:var(--text3);cursor:pointer;font-family:var(--ff);text-align:left;transition:color .12s}
.archive-show-more:hover{color:var(--navy)}
.archive-no-eps{font-size:12px;color:var(--text3);padding:8px 16px;background:var(--bg);border-top:1px solid var(--border)}

/* ── ARCHIVE — ANALYZED ── */
.history-col-hd{display:grid;grid-template-columns:1fr 56px 80px 36px;gap:8px;padding:7px 16px;font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--text3);border:1px solid var(--border);border-radius:var(--r) var(--r) 0 0;background:var(--bg3)}
.history-row{display:grid;grid-template-columns:1fr 56px 80px 36px;gap:8px;align-items:center;padding:9px 16px;background:var(--bg2);border:1px solid var(--border);border-top:none;cursor:pointer;transition:background .1s}
.history-row:last-of-type{border-radius:0 0 var(--r) var(--r)}
.history-row:hover{background:var(--bg3)}
.hr-ep{min-width:0}
.hr-title{font-size:12px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--text);margin-bottom:1px}
.hr-show{font-size:10px;color:var(--text3)}
.hr-date{font-size:11px;color:var(--text3);text-align:right}
.hr-lean{text-align:right}
.hr-score{font-size:11px;color:var(--text3);text-align:right;font-weight:500}


/* ── LIKED / PLAYLISTS GRID ── */
.saved-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
@media(max-width:900px){.saved-grid{grid-template-columns:repeat(2,1fr)}}
@media(max-width:520px){.saved-grid{grid-template-columns:1fr}}
.saved-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:14px;display:flex;gap:12px;align-items:flex-start;transition:border-color .1s}
.saved-card:hover{border-color:var(--border2)}
.saved-art{width:56px;height:56px;border-radius:4px;object-fit:cover;flex-shrink:0;background:var(--bg3)}
.saved-art-ph{width:56px;height:56px;border-radius:4px;background:var(--navy);display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:700;color:#fff;font-family:var(--ffs);flex-shrink:0}
.saved-info{flex:1;min-width:0}
.saved-show{font-size:10px;color:var(--text3);margin-bottom:2px;text-transform:uppercase;letter-spacing:.06em;font-weight:600}
.saved-title{font-size:12px;font-weight:600;line-height:1.35;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;margin-bottom:8px}
.saved-card-actions{display:flex;gap:6px}
.btn-remove{padding:4px 8px;background:transparent;color:var(--text3);border:1px solid var(--border2);border-radius:var(--r);font-size:10px;cursor:pointer;font-family:var(--ff);transition:all .1s}
.btn-remove:hover{color:#dc2626;border-color:#dc2626}
</style>
</head>
<body>

<nav>
  <a class="pl-lockup" href="/" aria-label="Podlens home">
    <img src="/favicon.svg" class="pl-lockup-icon" alt="" width="28" height="28">
    <span class="pl-lockup-divider"></span>
    <span class="pl-lockup-text">
      <span class="pl-lockup-wm"><span class="pl-wm-pod">POD</span><span class="pl-wm-lens">LENS</span></span>
      <span class="pl-lockup-tagline">Know what you're actually listening to</span>
    </span>
  </a>
  <div class="nav-links" id="nav-links"></div>
</nav>
<script src="/nav.js" defer></script>

<div class="page">
  <!-- Left Nav — matches dashboard layout -->
  <div class="lib-nav">
    <div class="lib-nav-lbl">Menu</div>
    <button class="lib-nav-btn" id="nav-home-toggle" onclick="libToggleDrop('home')"><svg width="14" height="14" fill="currentColor" viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg>Home<span class="lib-nav-arrow open" id="lib-arr-home">›</span></button>
    <div class="lib-nav-sub open" id="lib-drop-home">
      <a href="/?section=intelligence" class="lib-nav-sub-btn"><svg width="11" height="11" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>My intelligence</a>

<script>
(function () {
  /* ── HELPERS ── */
  function plUser() { try { return JSON.parse(localStorage.getItem('pl-user') || 'null'); } catch (e) { return null; } }
  function esc(s) { return String(s || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;'); }
  function timeAgo(iso) {
    if (!iso) return '';
    var d = Math.floor((Date.now() - new Date(iso)) / 1000);
    if (d < 60) return 'just now';
    if (d < 3600) return Math.floor(d / 60) + 'm ago';
    if (d < 86400) return Math.floor(d / 3600) + 'h ago';
    if (d < 604800) return Math.floor(d / 86400) + 'd ago';
    return new Date(iso).toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
  }
  function biasPillClass(leftPct, rightPct) {
    var diff = Math.abs((leftPct || 0) - (rightPct || 0));
    if (diff < 20) return 'balanced';
    var dir = (leftPct || 0) > (rightPct || 0) ? 'left' : 'right';
    if (diff < 40) return 'lightly-' + dir;
    return dir;
  }
  function biasPillLabel(leftPct, rightPct) {
    var diff = Math.abs((leftPct || 0) - (rightPct || 0));
    if (diff < 20) return 'Mostly Balanced';
    var dir = (leftPct || 0) > (rightPct || 0) ? 'Left-Leaning' : 'Right-Leaning';
    if (diff < 40) return 'Lightly ' + dir;
    if (diff < 60) return dir;
    return 'Strongly ' + dir;
  }
  function biasFromEp(ep) {
    return biasPillLabel(ep.leftPct, ep.rightPct);
  }
  function biasCls(ep) {
    return biasPillClass(ep.leftPct, ep.rightPct);
  }
  function artHtml(src, name, cls) {
    var initial = (name || 'P').charAt(0).toUpperCase();
    var phCls = cls.replace('-', '-ph');
    if (src) {
      return '<img class="' + cls + '" src="' + esc(src) + '" alt="" loading="lazy" onerror="this.outerHTML=\'<div class=&quot;' + phCls + '&quot;>' + initial + '</div>\'">';
    }
    return '<div class="' + phCls + '">' + initial + '</div>';
  }

  /* ── DATA ── */
  var u = plUser();
  var follows = [];
  var analyses = [];
  var activeTab = 'following';
  var searchQuery = '';

  function getPlanLimits() {
    if (!u) return { max: 3, label: 'week', unlimited: false };
    var plan = u.plan || 'free';
    if (plan === 'trial') return { max: 30, label: 'trial', unlimited: false };
    if (plan === 'creator') return { max: 25, label: 'week', unlimited: false };
    if (plan === 'operator') return { max: 100, label: 'week', unlimited: false };
    if (plan === 'studio') return { max: 0, label: '', unlimited: true };
    return { max: 3, label: 'week', unlimited: false };
  }

  /* ── AUTH GATE ── */
  if (!u || !u.id) {
    sessionStorage.setItem('pl-auth-toast', 'Sign in to access your Library');
    window.location.href = '/';
    return;
  }

  /* ── LOAD DATA ── */
  function loadData() {
    try {
      follows = (u.followedShows || []).slice();
      analyses = (u.analyzedEpisodes || []).slice().sort(function (a, b) {
        return new Date(b.analyzedAt || 0) - new Date(a.analyzedAt || 0);
      });
    } catch (e) { }

    // Update tab counts
    document.getElementById('tc-following').textContent = follows.length;
    document.getElementById('tc-analyzed').textContent = analyses.length;
    // Update sidebar nav counts
    var cntF = document.getElementById('lib-count-following');
    var cntA = document.getElementById('lib-count-analyzed');
    var cntL = document.getElementById('lib-count-liked');
    if (cntF) cntF.textContent = follows.length || '';
    if (cntA) cntA.textContent = analyses.length || '';
    if (cntL) cntL.textContent = saved.length || '';

    renderAll();
    // Render echo chamber in library
    renderLibEchoChamber(analyses);
  }

  /* ── RENDER ── */
  function renderAll() {
    renderLibraryOverview();
    renderFollowing();
    renderLiked();
    renderPlaylists();
    renderAnalyzed();
  }

  function applySearch(arr, fields) {
    if (!searchQuery) return arr;
    var q = searchQuery.toLowerCase();
    return arr.filter(function (item) {
      return fields.some(function (f) { return (item[f] || '').toLowerCase().includes(q); });
    });
  }

  /* Library overview — landing page when clicking My Library */
  function renderLibraryOverview() {
    var el = document.getElementById('library-overview-content');
    if (!el) return;

    // Bias intelligence strip
    var fp = (typeof calcBiasFingerprint === 'function') ? calcBiasFingerprint(analyses) : null;
    var eco = (typeof calcEchoChamber === 'function') ? calcEchoChamber(analyses) : null;
    var mostBiased = '';
    var mostBiasedLean = '';
    var mostBiasedCls = '';
    if (follows.length) {
      // Find show with biggest left-right spread
      follows.forEach(function(s) {
        var b = s.bias || {};
        var l = b.l || b.leftPct || 0;
        var r = b.r || b.rightPct || 0;
        if (!mostBiased || Math.abs(l - r) > 20) {
          mostBiased = s.name || '';
          mostBiasedLean = l > r ? 'Leans left' : r > l ? 'Leans right' : 'Center';
          mostBiasedCls = l > r ? 'bias-pill left' : r > l ? 'bias-pill right' : 'bias-pill balanced';
        }
      });
    }

    var fpL = fp ? fp.leftPct : 0;
    var fpC = fp ? fp.centerPct : 100;
    var fpR = fp ? fp.rightPct : 0;
    var ecoScore = eco && eco.hasData ? eco.score : null;
    var ecoLabel = eco && eco.hasData ? eco.label : null;
    var ecoColor = eco && eco.hasData ? eco.color : 'var(--text3)';

    var html = '';

    // Intelligence strip
    html += '<div style="background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:14px 18px;margin-bottom:20px;display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px">';
    // Library lean
    html += '<div>';
    html += '<div style="font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--text3);margin-bottom:6px">Library lean</div>';
    if (fp && fp.hasData) {
      html += '<div style="height:6px;border-radius:3px;overflow:hidden;display:flex;margin-bottom:4px">';
      html += '<div style="width:'+fpL+'%;background:#E24B4A"></div><div style="width:'+fpC+'%;background:var(--border2)"></div><div style="width:'+fpR+'%;background:#378ADD"></div>';
      html += '</div>';
      html += '<div style="font-size:10px;color:var(--text3)">'+fpL+'% left · '+fpC+'% center · '+fpR+'% right</div>';
    } else {
      html += '<div style="font-size:12px;color:var(--text3)">No data yet</div>';
    }
    html += '</div>';
    // Echo chamber
    html += '<div>';
    html += '<div style="font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--text3);margin-bottom:6px">Echo chamber</div>';
    if (ecoScore !== null) {
      html += '<div style="font-size:18px;font-weight:700;color:'+ecoColor+'">'+ecoScore+'<span style="font-size:11px;font-weight:400;color:var(--text3)">/100</span></div>';
      html += '<div style="font-size:11px;color:'+ecoColor+'">'+ecoLabel+'</div>';
    } else {
      html += '<div style="font-size:12px;color:var(--text3)">Analyze 3+ episodes to unlock</div>';
    }
    html += '</div>';
    // Most biased source
    html += '<div>';
    html += '<div style="font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--text3);margin-bottom:6px">Most biased source</div>';
    if (mostBiased) {
      html += '<div style="font-size:13px;font-weight:600;color:var(--text);margin-bottom:4px">'+esc(mostBiased)+'</div>';
      html += '<span class="'+mostBiasedCls+'">'+mostBiasedLean+'</span>';
    } else {
      html += '<div style="font-size:12px;color:var(--text3)">Follow shows to see this</div>';
    }
    html += '</div>';
    html += '</div>'; // end intel strip

    // Filter tabs
    html += '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">';
    html += '<div style="font-size:14px;font-weight:600;color:var(--text)">Your followed shows</div>';
    html += '<a href="/library" onclick="switchTab('following');setNavActive(document.getElementById('nav-following'));return false" style="font-size:12px;color:var(--navy);text-decoration:none">See all &#8594;</a>';
    html += '</div>';

    var filters = [
      {id:'all', label:'All shows', dot:''},
      {id:'left', label:'Left leaning', dot:'#E24B4A'},
      {id:'center', label:'Center', dot:'#D1CFC9'},
      {id:'right', label:'Right leaning', dot:'#378ADD'}
    ];
    html += '<div style="display:flex;gap:6px;margin-bottom:16px;flex-wrap:wrap">';
    filters.forEach(function(f, i) {
      var isOn = i === 0;
      html += '<button onclick="libFilterShows(''+f.id+'',this)" style="padding:4px 12px;font-size:11px;font-weight:500;border:1px solid var(--border2);border-radius:999px;cursor:pointer;background:'+(isOn?'var(--navy)':'none')+';color:'+(isOn?'#fff':'var(--text2)')+';font-family:var(--ff);display:flex;align-items:center;gap:5px;transition:all .12s">';
      if (f.dot) html += '<span style="width:7px;height:7px;border-radius:50%;background:'+f.dot+';display:inline-block"></span>';
      html += f.label;
      html += '</button>';
    });
    html += '</div>';

    // Show cards grid
    html += '<div id="lib-shows-grid">';
    html += buildShowsGrid('all');
    html += '</div>';

    // See all row
    if (follows.length) {
      html += '<div onclick="switchTab('following');setNavActive(document.getElementById('nav-following'))" style="display:flex;align-items:center;justify-content:space-between;padding:10px 14px;background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);cursor:pointer;margin-bottom:24px;transition:border-color .12s" onmouseover="this.style.borderColor='var(--border2)'" onmouseout="this.style.borderColor='var(--border)'">';
      html += '<span style="font-size:13px;font-weight:500;color:var(--text)">See all '+follows.length+' followed shows</span>';
      html += '<span style="font-size:11px;color:var(--text3)">Following &#8594;</span>';
      html += '</div>';
    }

    // Recently analyzed
    if (analyses.length) {
      html += '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">';
      html += '<div style="font-size:14px;font-weight:600;color:var(--text)">Recently analyzed</div>';
      html += '<button onclick="switchTab('analyzed');setNavActive(document.getElementById('nav-analyzed'))" style="font-size:12px;color:var(--navy);background:none;border:none;cursor:pointer;font-family:var(--ff)">See all &#8594;</button>';
      html += '</div>';
      html += '<div style="display:flex;flex-direction:column;gap:6px">';
      analyses.slice(0,3).forEach(function(ep) {
        var pillCls = biasCls(ep);
        var pillLabel = ep.biasLabel || biasFromEp(ep);
        var viewUrl = ep.jobId ? '/?jobId='+ep.jobId : '#';
        html += '<div onclick="window.location=''+esc(viewUrl)+''" style="display:flex;align-items:center;gap:10px;padding:9px 14px;background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);cursor:pointer;transition:border-color .1s" onmouseover="this.style.borderColor='var(--border2)'" onmouseout="this.style.borderColor='var(--border)'">';
        html += artHtml(ep.artwork, ep.showName, 'ep-art-sm');
        html += '<div style="flex:1;min-width:0"><div style="font-size:12px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">'+esc(ep.episodeTitle||'Episode')+'</div>';
        html += '<div style="font-size:10px;color:var(--text3);margin-top:1px">'+esc(ep.showName||'')+(ep.analyzedAt?' · '+timeAgo(ep.analyzedAt):'')+'</div></div>';
        html += (pillLabel ? '<span class="bias-pill '+pillCls+'" style="font-size:10px">'+pillLabel+'</span>' : '');
        html += '</div>';
      });
      html += '</div>';
    }

    el.innerHTML = html;
  }

  window.libFilterShows = function(filter, btn) {
    // Update active pill
    if (btn && btn.parentElement) {
      btn.parentElement.querySelectorAll('button').forEach(function(b) {
        b.style.background = 'none';
        b.style.color = 'var(--text2)';
      });
      btn.style.background = 'var(--navy)';
      btn.style.color = '#fff';
    }
    var grid = document.getElementById('lib-shows-grid');
    if (grid) grid.innerHTML = buildShowsGrid(filter);
  };

  function buildShowsGrid(filter) {
    var items = follows.filter(function(s) {
      if (filter === 'all') return true;
      var b = s.bias || {};
      var l = b.l || b.leftPct || 0;
      var r = b.r || b.rightPct || 0;
      var diff = Math.abs(l - r);
      if (filter === 'center') return diff < 20;
      if (filter === 'left') return l > r && diff >= 20;
      if (filter === 'right') return r > l && diff >= 20;
      return true;
    });
    if (!items.length) {
      return '<div style="text-align:center;padding:32px;color:var(--text3);font-size:13px">No shows in this category yet.</div>';
    }
    var html = '<div style="display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:14px">';
    items.forEach(function(s, i) {
      var b = s.bias || {};
      var l = b.l || b.leftPct || 0;
      var r = b.r || b.rightPct || 0;
      var ctr = 100 - l - r;
      var bLabel = biasPillLabel(l, r);
      var bCls = biasPillClass(l, r);
      var showName = s.name || s.showName || '';
      // Find analyzed episodes for this show
      var showEps = analyses.filter(function(ep) {
        return (ep.showName||'').toLowerCase() === showName.toLowerCase();
      }).sort(function(a,b){ return new Date(b.analyzedAt||0) - new Date(a.analyzedAt||0); });
      var analyzeUrl = s.feedUrl || s.youtubeUrl || '';

      html += '<div style="background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:12px;cursor:pointer;transition:border-color .12s" onmouseover="this.style.borderColor='var(--border2)'" onmouseout="this.style.borderColor='var(--border)'">';
      // Top row
      html += '<div style="display:flex;align-items:center;gap:9px;margin-bottom:9px">';
      html += artHtml(s.artwork, showName, 'show-art-lg');
      html += '<div style="flex:1;min-width:0"><div style="font-size:12px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">'+esc(showName)+'</div>';
      html += '<div style="font-size:10px;color:var(--text3);margin-top:1px">'+esc(s.host||'')+(showEps.length?' · '+showEps.length+' analyzed':'')+'</div></div>';
      html += '<span class="bias-pill '+bCls+'" style="font-size:9px">'+esc(bLabel)+'</span>';
      html += '</div>';
      // Bias bar
      if (l || r) {
        html += '<div style="height:5px;border-radius:3px;overflow:hidden;display:flex;margin-bottom:3px">';
        html += '<div style="width:'+l+'%;background:#E24B4A"></div><div style="width:'+ctr+'%;background:var(--border2)"></div><div style="width:'+r+'%;background:#378ADD"></div>';
        html += '</div>';
        html += '<div style="display:flex;justify-content:space-between;font-size:9px;color:var(--text3);margin-bottom:8px">';
        html += '<span style="color:#E24B4A">'+l+'%</span><span>'+ctr+'% center</span><span style="color:#378ADD">'+r+'%</span>';
        html += '</div>';
      }
      // Preview button + analyze button
      html += '<div style="display:flex;gap:5px">';
      if (analyzeUrl) html += '<button class="btn-analyze" onclick="event.stopPropagation();analyzeLatest(''+esc(analyzeUrl)+'',''+esc(showName)+'')">Analyze &#8594;</button>';
      html += '<button onclick="event.stopPropagation();libTogglePreview(this,'+i+')" style="padding:5px 10px;background:transparent;color:var(--text3);border:1px solid var(--border2);border-radius:var(--r);font-size:11px;cursor:pointer;font-family:var(--ff)">Preview &#9662;</button>';
      html += '</div>';
      // Preview panel (hidden by default)
      if (showEps.length) {
        html += '<div class="lib-preview-panel" style="display:none;margin-top:8px;padding-top:8px;border-top:1px solid var(--border)">';
        showEps.slice(0,2).forEach(function(ep,n) {
          var epCls = biasCls(ep); var epLbl = ep.biasLabel||biasFromEp(ep);
          var vUrl = ep.jobId?'/?jobId='+ep.jobId:'#';
          html += '<div onclick="window.location=''+esc(vUrl)+''" style="display:flex;align-items:center;gap:6px;padding:5px 0;cursor:pointer;font-size:11px;border-bottom:0.5px solid var(--border)">';
          html += '<span style="width:16px;text-align:right;color:var(--text3);font-size:10px;flex-shrink:0">'+(n+1)+'</span>';
          html += '<span style="flex:1;min-width:0;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">'+esc(ep.episodeTitle||'Episode')+'</span>';
          html += '<span class="bias-pill '+epCls+'" style="font-size:8px;padding:1px 5px">'+esc(epLbl)+'</span>';
          html += '</div>';
        });
        if (showEps.length > 2) {
          html += '<button onclick="switchTab('following');setNavActive(document.getElementById('nav-following'))" style="width:100%;padding:5px;background:none;border:none;font-size:10px;color:var(--text3);cursor:pointer;font-family:var(--ff);text-align:left">+ '+(showEps.length-2)+' more &#8594; See in Following</button>';
        }
        html += '</div>';
      }
      html += '</div>';
    });
    html += '</div>';
    return html;
  }

  window.libTogglePreview = function(btn, idx) {
    var card = btn.closest('div[style*="background:var(--bg2)"]');
    if (!card) return;
    var preview = card.querySelector('.lib-preview-panel');
    if (!preview) return;
    var isOpen = preview.style.display !== 'none';
    preview.style.display = isOpen ? 'none' : 'block';
    btn.innerHTML = isOpen ? 'Preview &#9662;' : 'Hide &#9652;';
  };

  /* Following — archive style */
  function renderFollowing() {
    var el = document.getElementById('following-content');
    var items = applySearch(follows, ['name', 'host', 'latestEp']);
    if (!items.length) {
      el.innerHTML = '<div class="empty-state"><div class="empty-icon">🎧</div>'
        + '<div class="empty-title">' + (follows.length ? 'No matching shows' : "You haven't followed any shows yet") + '</div>'
        + '<div class="empty-sub">' + (follows.length ? 'Try a different search.' : 'Head to Discover to find podcasts to follow.') + '</div>'
        + (!follows.length ? '<a href="/" class="btn-cta">Go to Discover →</a>' : '')
        + '</div>';
      return;
    }
    var plan = u ? (u.plan || 'free') : 'free';
    var showSQ = ['creator','operator','studio','trial'].includes(plan);
    var html = '';
    html += '<div class="archive-search-wrap"><svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg><input type="text" class="archive-search" placeholder="Search your followed shows…" oninput="filterLib(this.value)"></div>';
    items.forEach(function(s, i) {
      var showName = s.name || s.showName || '';
      var showEps = analyses.filter(function(ep) {
        return (ep.showName || ep.show || '').toLowerCase() === showName.toLowerCase();
      }).sort(function(a,b){ return new Date(b.analyzedAt||0) - new Date(a.analyzedAt||0); });
      var artEl = s.artwork
        ? '<img class="sah-art" src="' + esc(s.artwork) + '" alt="" loading="lazy" onerror="this.outerHTML='<div class=\"sah-art-ph\">' + esc((showName||'P').charAt(0).toUpperCase()) + '</div>'">'
        : '<div class="sah-art-ph">' + esc((showName||'P').charAt(0).toUpperCase()) + '</div>';
      var bias = s.bias || {};
      var bLabel = biasPillLabel(bias.l || bias.leftPct, bias.r || bias.rightPct);
      var bCls   = biasPillClass(bias.l || bias.leftPct, bias.r || bias.rightPct);
      var trendBars = showEps.slice(0,6).reverse().map(function(ep) {
        var h = Math.max(20, Math.min(100, ep.credibilityScore || ep.hostTrustScore || 55));
        var col = (ep.leftPct||0) > (ep.rightPct||0) ? 'var(--left)' : (ep.rightPct||0) > (ep.leftPct||0) ? 'var(--right)' : 'var(--center)';
        return '<div class="sah-trend-bar" style="height:' + h + '%;background:' + col + ';opacity:.7"></div>';
      }).join('');
      var sqHtml = showSQ ? '<label class="sq-toggle" title="Smart Queue"><input type="checkbox" ' + (s.smartQueue ? 'checked' : '') + ' onchange="toggleSmartQueue(' + i + ',this.checked)"><span class="sq-slider"></span></label>' : '';
      var analyzeUrl = s.feedUrl || s.youtubeUrl || '';
      var hasEps = showEps.length > 0;
      html += '<div class="show-archive-block">';
      html += '<div class="show-archive-hd' + (hasEps ? ' has-eps' : '') + '">';
      html += artEl;
      html += '<div class="sah-info"><div class="sah-name">' + esc(showName) + '</div>';
      html += '<div class="sah-meta">' + (s.host ? esc(s.host) + ' · ' : '') + (hasEps ? showEps.length + ' analyzed' : 'No analyses yet') + '</div></div>';
      if (trendBars) html += '<div class="sah-trend">' + trendBars + '</div>';
      if (bLabel && (bias.l !== undefined || bias.leftPct !== undefined)) html += '<span class="bias-pill ' + bCls + '">' + esc(bLabel) + '</span>';
      html += '<div class="sah-actions">' + sqHtml;
      if (analyzeUrl) html += '<button class="btn-analyze" onclick="analyzeLatest('' + esc(analyzeUrl) + '','' + esc(showName) + '')">Analyze →</button>';
      html += '<button class="btn-unfollow" onclick="unfollowShow(' + i + ')">Unfollow</button>';
      html += '</div></div>';
      if (hasEps) {
        html += '<div class="archive-ep-list">';
        showEps.slice(0,3).forEach(function(ep, n) {
          var epCls = biasCls(ep); var epLbl = ep.biasLabel || biasFromEp(ep);
          var viewUrl = ep.jobId ? '/?jobId=' + ep.jobId : '#';
          html += '<div class="archive-ep" onclick="window.location='' + esc(viewUrl) + ''">';
          html += '<span class="aep-num">' + (n+1) + '</span>';
          html += '<span class="aep-title">' + esc(ep.episodeTitle || ep.title || 'Episode') + '</span>';
          html += '<span class="bias-pill ' + epCls + '" style="font-size:9px;padding:2px 6px;flex-shrink:0">' + esc(epLbl) + '</span>';
          html += '<span class="aep-date">' + esc(timeAgo(ep.analyzedAt)) + '</span></div>';
        });
        if (showEps.length > 3) html += '<button class="archive-show-more" onclick="switchTab('analyzed')">+ ' + (showEps.length-3) + ' more analyzed episodes — see in Analyzed →</button>';
        html += '</div>';
      } else {
        html += '<div class="archive-ep-list"><div class="archive-no-eps">No analyses yet — <button onclick="analyzeLatest('' + esc(analyzeUrl) + '','' + esc(showName) + '')" style="background:none;border:none;color:var(--navy);font-size:12px;cursor:pointer;font-family:var(--ff);padding:0;font-weight:500">analyze latest →</button></div></div>';
      }
      html += '</div>';
    });
    el.innerHTML = html;
  }

  /* Analyzed — flat archive list */
  function renderAnalyzed() {
    var el = document.getElementById('analyzed-content');
    var items = applySearch(analyses, ['episodeTitle', 'showName']);
    var lim = getPlanLimits();
    var used = u.analysesThisWeek || 0;
    var umHtml = '';
    if (!lim.unlimited) {
      var pct = Math.min(100, Math.round(used / lim.max * 100));
      var fillCls = pct >= 100 ? 'red' : pct >= 80 ? 'amber' : '';
      umHtml = '<div class="usage-meter"><span class="usage-label">' + used + ' of ' + lim.max + ' analyses this ' + lim.label + '</span><div class="usage-track"><div class="usage-fill ' + fillCls + '" style="width:' + pct + '%"></div></div><span class="usage-pct">' + pct + '%</span>' + (pct >= 80 ? '<a href="/pricing.html" class="usage-upgrade">Upgrade →</a>' : '') + '</div>';
    } else {
      umHtml = '<div class="usage-meter"><span class="usage-label" style="color:var(--text3)">Unlimited analyses</span></div>';
    }
    document.getElementById('usage-meter-wrap').innerHTML = umHtml;
    if (!items.length) {
      el.innerHTML = '<div class="empty-state"><div class="empty-icon">📊</div>'
        + '<div class="empty-title">' + (analyses.length ? 'No matching analyses' : 'No analyses yet') + '</div>'
        + '<div class="empty-sub">' + (analyses.length ? 'Try a different search.' : 'Analyze any podcast episode to see it here.') + '</div>'
        + (!analyses.length ? '<a href="/" class="btn-cta">Analyze an episode →</a>' : '')
        + '</div>';
      return;
    }
    var html = '<div class="history-col-hd"><span>Episode</span><span style="text-align:right">Date</span><span style="text-align:right">Lean</span><span style="text-align:right">Score</span></div>';
    html += items.map(function(ep) {
      var pillCls = biasCls(ep);
      var pillLabel = ep.biasLabel || biasFromEp(ep);
      var viewUrl = ep.jobId ? '/?jobId=' + ep.jobId : '#';
      var score = ep.credibilityScore || ep.hostTrustScore || '';
      return '<div class="history-row" onclick="window.location='' + esc(viewUrl) + ''">'
        + '<div class="hr-ep"><div class="hr-title">' + esc(ep.episodeTitle || 'Episode') + '</div><div class="hr-show">' + esc(ep.showName || '') + '</div></div>'
        + '<div class="hr-date">' + esc(timeAgo(ep.analyzedAt)) + '</div>'
        + '<div class="hr-lean">' + (pillLabel ? '<span class="bias-pill ' + pillCls + '" style="font-size:9px;padding:2px 6px">' + esc(pillLabel) + '</span>' : '') + '</div>'
        + '<div class="hr-score">' + (score ? esc(String(score)) : '—') + '</div>'
        + '</div>';
    }).join('');
    el.innerHTML = html;
  }

  /* Liked episodes */
  var PL_LIKED_KEY = 'pl_liked_episodes';
  var PL_PLAYLISTS_KEY = 'pl_playlists';
  function getLiked() { try { return JSON.parse(localStorage.getItem(PL_LIKED_KEY)||'[]'); } catch(e){ return []; } }
  function getPlaylists() { try { return JSON.parse(localStorage.getItem(PL_PLAYLISTS_KEY)||'[]'); } catch(e){ return []; } }

  function renderLiked() {
    var el = document.getElementById('liked-content');
    var liked = getLiked();
    var tc = document.getElementById('tc-liked');
    if (tc) tc.textContent = liked.length || 0;
    if (!liked.length) {
      el.innerHTML = '<div class="empty-state"><div class="empty-icon">♡</div><div class="empty-title">No liked episodes yet</div><div class="empty-sub">Tap the heart on any episode in Discover to save it here.</div></div>';
      return;
    }
    el.innerHTML = '<div class="saved-grid">' + liked.map(function(ep, i) {
      return '<div class="saved-card">'
        + artHtml(ep.artwork, ep.showName, 'saved-art')
        + '<div class="saved-info">'
        + '<div class="saved-show">' + esc(ep.showName||'') + '</div>'
        + '<div class="saved-title">' + esc(ep.title||'Episode') + '</div>'
        + '<div style="font-size:11px;color:var(--text3);margin-top:4px">' + new Date(ep.likedAt||0).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}) + '</div>'
        + '<div class="saved-card-actions">'
        + (ep.url ? '<button class="btn-analyze" onclick="analyzeLatest(''+esc(ep.url)+'',''+esc(ep.showName||'')+'')">Analyze →</button>' : '')
        + '<button class="btn-remove" onclick="unlikeEp('+i+')">Unlike</button>'
        + '</div></div></div>';
    }).join('') + '</div>';
  }

  window.unlikeEp = function(i) {
    var liked = getLiked(); liked.splice(i,1);
    localStorage.setItem(PL_LIKED_KEY, JSON.stringify(liked));
    renderLiked();
  };

  function renderPlaylists() {
    var el = document.getElementById('playlists-content');
    var pls = getPlaylists();
    var tc = document.getElementById('tc-playlists');
    if (tc) tc.textContent = pls.length || 0;

    var activePl = window._activePl != null ? window._activePl : -1;

    if (activePl >= 0 && pls[activePl]) {
      var pl = pls[activePl];
      el.innerHTML = '<button onclick="window._activePl=null;renderPlaylists()" style="background:none;border:none;cursor:pointer;font-size:13px;color:var(--text2);font-family:var(--ff);margin-bottom:16px;padding:0">&larr; All playlists</button>'
        + '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px">'
        + '<div><div style="font-size:20px;font-weight:700;font-family:var(--ffs)">' + esc(pl.name) + '</div>'
        + '<div style="font-size:13px;color:var(--text3);margin-top:4px">' + pl.episodes.length + ' episode' + (pl.episodes.length!==1?'s':'') + '</div></div>'
        + '<button onclick="deletePlaylist('+activePl+')" style="background:none;border:1px solid var(--border2);border-radius:6px;padding:6px 12px;cursor:pointer;font-size:12px;color:var(--text3);font-family:var(--ff)">Delete playlist</button>'
        + '</div>';
      if (!pl.episodes.length) {
        el.innerHTML += '<div style="color:var(--text3);font-size:13px;padding:24px 0">No episodes in this playlist yet.</div>';
      } else {
        el.innerHTML += '<div class="saved-grid">' + pl.episodes.map(function(ep,i){
          return '<div class="saved-card">'
            + artHtml(ep.artwork, ep.showName, 'saved-art')
            + '<div class="saved-info">'
            + '<div class="saved-show">' + esc(ep.showName||'') + '</div>'
            + '<div class="saved-title">' + esc(ep.title||'Episode') + '</div>'
            + '<div class="saved-card-actions">'
            + (ep.url ? '<button class="btn-analyze" onclick="analyzeLatest(''+esc(ep.url)+'',''+esc(ep.showName||'')+'')">Analyze →</button>' : '')
            + '<button class="btn-remove" onclick="removeFromPlaylist('+activePl+','+i+')">Remove</button>'
            + '</div></div></div>';
        }).join('') + '</div>';
      }
      return;
    }

    if (!pls.length) {
      el.innerHTML = '<div class="empty-state"><div class="empty-icon">🎵</div><div class="empty-title">No playlists yet</div><div class="empty-sub">Tap "Add to playlist" on any episode to create your first playlist.</div></div>';
      return;
    }
    el.innerHTML = '<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:16px">'
      + pls.map(function(pl,i){
        var art = pl.episodes[0] && pl.episodes[0].artwork
          ? '<img src="'+pl.episodes[0].artwork+'" style="width:100%;aspect-ratio:1;object-fit:cover;border-radius:8px 8px 0 0" alt="" onerror="this.style.display='none'">'
          : '<div style="width:100%;aspect-ratio:1;background:var(--navy);border-radius:8px 8px 0 0;display:flex;align-items:center;justify-content:center;font-size:28px">🎵</div>';
        return '<div onclick="window._activePl='+i+';renderPlaylists()" style="background:var(--bg2);border:1px solid var(--border);border-radius:10px;overflow:hidden;cursor:pointer">'
          + art
          + '<div style="padding:12px 14px">'
          + '<div style="font-weight:600;font-size:14px">' + esc(pl.name) + '</div>'
          + '<div style="font-size:12px;color:var(--text3);margin-top:3px">' + pl.episodes.length + ' episode' + (pl.episodes.length!==1?'s':'') + '</div>'
          + '</div></div>';
      }).join('')
      + '</div>';
  }

  window.deletePlaylist = function(i) {
    var pls = getPlaylists(); pls.splice(i,1);
    localStorage.setItem(PL_PLAYLISTS_KEY, JSON.stringify(pls));
    window._activePl = null; renderPlaylists();
  };
  window.removeFromPlaylist = function(pi,ei) {
    var pls = getPlaylists(); pls[pi].episodes.splice(ei,1);
    localStorage.setItem(PL_PLAYLISTS_KEY, JSON.stringify(pls));
    renderPlaylists();
  };

  function renderLibEchoChamber(analyses) {
    var el = document.getElementById('lib-echo-content');
    if (!el) return;
    var eco = (typeof calcEchoChamber === 'function') ? calcEchoChamber(analyses || []) : { hasData: false };
    if (!eco || !eco.hasData) {
      el.innerHTML = '<div style="font-size:12px;color:var(--text3)">Analyze 3+ episodes across different shows to see your echo chamber score.</div>';
      return;
    }
    var barColor = eco.score <= 25 ? '#639922' : eco.score <= 50 ? '#BA7517' : '#E24B4A';
    el.innerHTML = '<div style="display:flex;align-items:baseline;gap:6px;margin-bottom:6px">'
      + '<span style="font-size:22px;font-weight:600;color:' + eco.color + '">' + eco.score + '</span>'
      + '<span style="font-size:11px;color:var(--text3)">/100</span>'
      + '<span style="font-size:11px;font-weight:600;color:' + eco.color + '">' + eco.label + '</span>'
      + '</div>'
      + '<div style="height:5px;border-radius:3px;background:var(--bg3);overflow:hidden;margin-bottom:6px">'
      + '<div style="height:100%;width:' + eco.score + '%;background:' + barColor + ';border-radius:3px"></div></div>'
      + '<div style="font-size:11px;color:var(--text3);line-height:1.5">' + eco.description + '</div>';
  }

  window.libToggleDrop = function(id) {
    var el = document.getElementById('lib-drop-' + id);
    var arr = document.getElementById('lib-arr-' + id);
    if (!el) return;
    var isOpen = el.classList.contains('open');
    el.classList.toggle('open', !isOpen);
    if (arr) arr.classList.toggle('open', !isOpen);
  };

  window.setNavActive = function(btn) {
    document.querySelectorAll('.lib-nav-btn, .lib-nav-sub-btn').forEach(function(b){ b.classList.remove('active'); });
    if (btn) btn.classList.add('active');
  };

  window.switchTab = function (tab) {
    if (tab === 'library') {
      renderLibraryOverview();
    }
    activeTab = tab;
    document.querySelectorAll('.lib-tab').forEach(function (t) {
      t.classList.toggle('active', t.id === 'tab-' + tab);
      t.setAttribute('aria-selected', t.id === 'tab-' + tab ? 'true' : 'false');
    });
    document.querySelectorAll('.lib-panel').forEach(function (p) {
      p.classList.toggle('active', p.id === 'panel-' + tab);
    });
    // Sync sidebar nav active state
    document.querySelectorAll('.lib-nav-btn, .lib-nav-sub-btn').forEach(function(b) {
      b.classList.toggle('active', b.id === 'nav-' + tab);
    });
    // Keep My Library button highlighted for all library sections
    var libHome = document.getElementById('nav-library-home');
    if (libHome) libHome.classList.add('active');
  };

  /* ── SEARCH ── */
  window.filterLib = function (q) {
    searchQuery = q;
    if (activeTab === 'following') renderFollowing();
    else if (activeTab === 'liked') renderLiked();
    else if (activeTab === 'playlists') { window._activePl = null; renderPlaylists(); }
    else if (activeTab === 'analyzed') renderAnalyzed();
    else if (activeTab === 'saved') renderSaved();
    else renderDownloads();
  };

  /* ── ACTIONS ── */
  window.toggleSmartQueue = function (idx, val) {
    if (!u.followedShows[idx]) return;
    u.followedShows[idx].smartQueue = val;
    localStorage.setItem('pl-user', JSON.stringify(u));
    follows = u.followedShows.slice();
  };

  window.unfollowShow = function (idx) {
    if (!confirm('Unfollow "' + (follows[idx] && follows[idx].name || 'this show') + '"?')) return;
    u.followedShows.splice(idx, 1);
    localStorage.setItem('pl-user', JSON.stringify(u));
    follows = u.followedShows.slice();
    document.getElementById('tc-following').textContent = follows.length;
    renderFollowing();
  };

  window.analyzeLatest = function (url, showName) {
    window.location.href = '/?analyze=' + encodeURIComponent(url) + '&show=' + encodeURIComponent(showName || '');
  };

  window.reAnalyze = function (url, epTitle, showName) {
    window.location.href = '/?analyze=' + encodeURIComponent(url) + '&ep=' + encodeURIComponent(epTitle || '') + '&show=' + encodeURIComponent(showName || '');
  };

  window.removeSaved = function (idx) {
    saved.splice(idx, 1);
    localStorage.setItem('pl-saved-episodes', JSON.stringify(saved));
  };

  window.deleteDownload = function (idx) {
    downloads.splice(idx, 1);
    localStorage.setItem('pl-downloads', JSON.stringify(downloads));
  };

  window.playDownload = function (url) {
    var audio = new Audio(url);
    audio.play().catch(function () { });
  };



  loadData();
})();
</script>
</body>
</html>
