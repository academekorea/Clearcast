<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <rect width="512" height="512" rx="80" fill="#0C1A24"/>
  <defs>
    <!--
      Two teal crescents built with masks.
      Geometry derived from source PNG:
        Top-right lobe centroid: (912,316) in 1270×1070 canvas → scaled to 512: (368,151)
        Bot-left lobe centroid:  (424,735) in 1270×1070 canvas → scaled to 512: (171,352)
      Each circle r ≈ 210 in 512-space.
      Each crescent = full circle masked by the sibling circle.
    -->
    <mask id="m-top">
      <rect width="512" height="512" fill="white"/>
      <!-- Hide the lower-left area (bot circle position) -->
      <circle cx="174" cy="354" r="214" fill="black"/>
    </mask>
    <mask id="m-bot">
      <rect width="512" height="512" fill="white"/>
      <!-- Hide the upper-right area (top circle position) -->
      <circle cx="338" cy="158" r="214" fill="black"/>
    </mask>
  </defs>

  <!-- Top-right crescent -->
  <circle cx="338" cy="158" r="214" fill="#07BAD2" mask="url(#m-top)"/>

  <!-- Bottom-left crescent -->
  <circle cx="174" cy="354" r="214" fill="#07BAD2" mask="url(#m-bot)"/>

  <!--
    Dark swoosh lines — two curved strokes that arc through the pinwheel centre.
    Replicate the two dark brush strokes visible in the original logo.
  -->
  <path d="M 318 82 C 430 180 390 330 290 448"
        stroke="#0C1A24" stroke-width="32" fill="none"
        stroke-linecap="round"/>
  <path d="M 296 66 C 390 180 360 340 252 458"
        stroke="#0C1A24" stroke-width="16" fill="none"
        stroke-linecap="round"/>
</svg>
